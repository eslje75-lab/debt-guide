<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서류 체크센터 | 채무정리길잡이</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50">
<div id="header-placeholder"></div>

<section class="bg-blue-700 text-white py-8">
  <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-2xl md:text-3xl font-bold mb-1">서류 체크센터</h1>
    <p class="text-blue-100 text-sm">필요한 서류를 카테고리별로 확인하고 준비 여부를 체크하세요.</p>
  </div>
</section>

<div class="max-w-5xl mx-auto px-4 py-8">

  <!-- 절차 선택 탭 -->
  <div class="flex gap-2 mb-6 overflow-x-auto pb-1">
    <button onclick="setTab('all')" id="tab-all" class="tab-btn bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap">전체</button>
    <button onclick="setTab('common')" id="tab-common" class="tab-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">공통서류</button>
    <button onclick="setTab('rehab')" id="tab-rehab" class="tab-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">개인회생</button>
    <button onclick="setTab('bankrupt')" id="tab-bankrupt" class="tab-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">개인파산·면책</button>
    <button onclick="setTab('income')" id="tab-income" class="tab-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">소득자료</button>
    <button onclick="setTab('asset')" id="tab-asset" class="tab-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">재산자료</button>
    <button onclick="setTab('debt')" id="tab-debt" class="tab-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">채무자료</button>
  </div>

  <!-- 준비 현황 -->
  <div class="bg-white rounded-xl border border-slate-100 p-4 mb-6 flex items-center gap-6 shadow-sm">
    <div class="text-center">
      <div id="done-count" class="text-2xl font-bold text-blue-700">0</div>
      <div class="text-xs text-slate-400">준비 완료</div>
    </div>
    <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
      <div id="docs-bar" class="progress-bar h-full bg-blue-600 rounded-full" style="width:0%"></div>
    </div>
    <div class="text-center">
      <div id="total-count" class="text-2xl font-bold text-slate-700">0</div>
      <div class="text-xs text-slate-400">전체 항목</div>
    </div>
  </div>

  <!-- 서류 목록 -->
  <div id="docs-container" class="space-y-4"></div>

  <div class="disclaimer-box mt-6">
    본 서류 목록은 일반적인 참고 안내입니다. 실제 제출 서류는 법원 및 담당 재판부의 안내에 따라 달라질 수 있습니다.
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="toast"></div>

<!-- 예시 모달 -->
<div id="example-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" style="display:none!important">
  <div class="bg-white rounded-2xl max-w-lg w-full max-h-[80vh] overflow-y-auto p-6 shadow-2xl">
    <div class="flex items-center justify-between mb-4">
      <h3 id="modal-title" class="font-bold text-slate-800 text-lg"></h3>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 text-2xl leading-none">×</button>
    </div>
    <div id="modal-content" class="text-sm text-slate-600 leading-relaxed whitespace-pre-line bg-slate-50 p-4 rounded-xl border border-slate-200"></div>
    <button onclick="closeModal()" class="mt-4 w-full py-2.5 bg-blue-700 text-white rounded-lg text-sm font-medium hover:bg-blue-800 transition-colors">닫기</button>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  initPage('documents');

  const ALL_DOCS = [
    // 공통
    { id: 'd-c1', cat: 'common', name: '주민등록등본', reason: '본인 인적사항·세대 확인', where: '주민센터 / 정부24', example: '발급일 기준 3개월 이내 발급 권장. 세대 전원이 기재된 것으로 발급.' },
    { id: 'd-c2', cat: 'common', name: '가족관계증명서', reason: '부양가족 확인', where: '주민센터 / 대법원 전자가족관계등록시스템', example: '본인 기준 발급. 부양가족 수 확인용.' },
    { id: 'd-c3', cat: 'common', name: '인감증명서 또는 본인서명사실확인서', reason: '본인 확인 및 서명 인증', where: '주민센터', example: '신청일 기준 3개월 이내 발급.' },

    // 개인회생 전용
    { id: 'd-r1', cat: 'rehab', name: '개인회생 신청서 (법원 양식)', reason: '회생 신청의 핵심 서류', where: '대법원 홈페이지 다운로드', example: '법원 양식을 반드시 사용. 자필 작성 후 서명·날인 필요.' },
    { id: 'd-r2', cat: 'rehab', name: '변제계획안', reason: '월 변제액·기간 제시', where: '직접 작성 (법원 양식 참고)', example: '월 변제금 × 변제기간(36~60개월) 기재.\n변제금은 실제 가능한 금액으로 작성.' },
    { id: 'd-r3', cat: 'rehab', name: '수입·지출 명세서 (법원 양식)', reason: '변제 가능액 산정', where: '법원 양식 다운로드 후 직접 작성', example: '실제 수입·지출 기준으로 작성. 항목별 증빙 필요.' },

    // 개인파산·면책 전용
    { id: 'd-b1', cat: 'bankrupt', name: '파산 신청서 (법원 양식)', reason: '파산 신청의 핵심 서류', where: '대법원 홈페이지 다운로드', example: '법원 양식 사용. 면책 신청서와 동시 제출 권장.' },
    { id: 'd-b2', cat: 'bankrupt', name: '면책 신청서', reason: '채무 면책 신청', where: '대법원 홈페이지 다운로드', example: '파산 신청서와 함께 제출. 별도 접수도 가능하나 동시 신청 권장.' },
    { id: 'd-b3', cat: 'bankrupt', name: '채무자 심문사항 진술서', reason: '채무 발생 경위 진술', where: '법원 양식 또는 자유 형식', example: '채무 발생 원인, 재산 처분 내역, 면책불허가 사유 해당 없음 진술 포함.' },

    // 소득자료
    { id: 'd-i1', cat: 'income', name: '근로소득원천징수영수증', reason: '연간 소득 확인', where: '회사 인사팀 / 국세청 홈택스', example: '최근 1~2년치 발급 권장.' },
    { id: 'd-i2', cat: 'income', name: '최근 3개월 급여명세서', reason: '월 소득 확인', where: '회사 인사팀', example: '급여 지급일·금액·세후 실수령액 확인.' },
    { id: 'd-i3', cat: 'income', name: '소득금액증명원', reason: '자영업·프리랜서 소득 확인', where: '국세청 홈택스 / 세무서', example: '사업소득이 있는 경우 반드시 준비.' },
    { id: 'd-i4', cat: 'income', name: '고용보험 피보험자격 이력', reason: '취업 이력 및 실직 확인', where: '고용보험 홈페이지 / 고용센터', example: '무직 기간 입증 자료로 활용.' },

    // 재산자료
    { id: 'd-a1', cat: 'asset', name: '예금잔액증명서 (전 금융기관)', reason: '예금·저축 현황 확인', where: '각 은행 창구 / 인터넷뱅킹', example: '신청일 기준 전 금융기관 잔액. 금융결제원 통합 조회 이용 가능.' },
    { id: 'd-a2', cat: 'asset', name: '부동산 등기사항전부증명서', reason: '부동산 보유 여부 확인', where: '인터넷 등기소(http://iros.go.kr)', example: '없으면 불필요. 담보대출이 있는 경우 근저당 설정 내용 확인.' },
    { id: 'd-a3', cat: 'asset', name: '차량등록증 사본', reason: '차량 보유 여부 확인', where: '차량 내 보관 / 자동차등록사업소', example: '없으면 불필요. 차량 시세(중고차 시세)도 함께 정리.' },
    { id: 'd-a4', cat: 'asset', name: '보험 해약환급금 조회 결과', reason: '보험 자산 확인', where: '보험다모아 / 각 보험사 고객센터', example: '생명보험·손해보험 모두 확인. 해약환급금이 있는 경우 금액 기재.' },
    { id: 'd-a5', cat: 'asset', name: '임대차계약서 사본', reason: '임차보증금 확인', where: '계약 당시 보관 서류', example: '보증금 금액·계약기간 확인.' },

    // 채무자료
    { id: 'd-d1', cat: 'debt', name: '채무잔액증명서 (채권자별)', reason: '각 채권자별 현재 채무액 확인', where: '각 금융기관 고객센터 / 창구', example: '신청 시점 기준 잔액 확인. 이자 포함 여부 확인.' },
    { id: 'd-d2', cat: 'debt', name: '대출약정서 또는 계약서', reason: '대출 조건·발생일 확인', where: '각 금융기관 보관 또는 재발급', example: '분실한 경우 해당 금융기관 고객센터에 재발급 요청.' },
    { id: 'd-d3', cat: 'debt', name: '지급명령·압류 관련 서류', reason: '법적 채무 현황 확인', where: '법원 송달 서류 보관', example: '압류·추심·소송 중인 경우 관련 서류 모두 정리.' },
  ];

  let currentTab = 'all';
  const savedChecks = Storage.load('docs_checks') || {};

  function setTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.className = b.id === 'tab-' + tab
        ? 'tab-btn bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap'
        : 'tab-btn bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap';
    });
    renderDocs();
  }

  const CAT_LABELS = {
    common: '공통서류',
    rehab: '개인회생',
    bankrupt: '개인파산·면책',
    income: '소득자료',
    asset: '재산자료',
    debt: '채무자료',
  };
  const CAT_COLORS = {
    common: 'bg-blue-100 text-blue-700',
    rehab: 'bg-green-100 text-green-700',
    bankrupt: 'bg-slate-100 text-slate-700',
    income: 'bg-purple-100 text-purple-700',
    asset: 'bg-amber-100 text-amber-700',
    debt: 'bg-red-100 text-red-700',
  };

  function renderDocs() {
    const docs = currentTab === 'all' ? ALL_DOCS : ALL_DOCS.filter(d => d.cat === currentTab);
    let total = docs.length, done = docs.filter(d => savedChecks[d.id]).length;

    const grouped = {};
    docs.forEach(d => {
      if (!grouped[d.cat]) grouped[d.cat] = [];
      grouped[d.cat].push(d);
    });

    let html = '';
    for (const [cat, items] of Object.entries(grouped)) {
      const rows = items.map(doc => {
        const checked = !!savedChecks[doc.id];
        return `
          <div class="checklist-item flex items-start gap-3 py-3 border-b border-slate-50 last:border-0 ${checked ? 'completed' : ''}" id="wrap-${doc.id}">
            <input type="checkbox" id="${doc.id}" ${checked ? 'checked' : ''}
              onchange="toggleDoc('${doc.id}')"
              class="mt-0.5 w-4 h-4 accent-blue-700 flex-shrink-0 cursor-pointer">
            <div class="flex-1 min-w-0">
              <label for="${doc.id}" class="cursor-pointer">
                <span class="item-name text-sm font-semibold text-slate-800 block">${doc.name}</span>
                <span class="text-xs text-slate-500">${doc.reason}</span>
              </label>
            </div>
            <div class="text-right text-xs text-slate-400 shrink-0 hidden sm:block max-w-32">${doc.where}</div>
            <button onclick="showExample('${encodeURIComponent(doc.name)}','${encodeURIComponent(doc.where + '\n\n' + doc.example)}')"
              class="shrink-0 text-xs text-blue-600 border border-blue-200 px-2 py-1 rounded hover:bg-blue-50 transition-colors whitespace-nowrap">
              예시
            </button>
          </div>`;
      }).join('');

      html += `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden mb-4">
          <div class="flex items-center gap-2 px-5 py-4 border-b border-slate-100">
            <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${CAT_COLORS[cat]}">${CAT_LABELS[cat]}</span>
            <span class="text-xs text-slate-400">${grouped[cat].filter(d => savedChecks[d.id]).length} / ${grouped[cat].length} 준비</span>
          </div>
          <div class="px-5">${rows}</div>
        </div>`;
    }

    document.getElementById('docs-container').innerHTML = html;
    document.getElementById('done-count').textContent = done;
    document.getElementById('total-count').textContent = total;
    document.getElementById('docs-bar').style.width = (total > 0 ? Math.round(done/total*100) : 0) + '%';
  }

  function toggleDoc(id) {
    const el = document.getElementById(id);
    savedChecks[id] = el.checked;
    Storage.save('docs_checks', savedChecks);
    const wrap = document.getElementById('wrap-' + id);
    if (wrap) wrap.classList.toggle('completed', el.checked);
    const docs = currentTab === 'all' ? ALL_DOCS : ALL_DOCS.filter(d => d.cat === currentTab);
    const done = docs.filter(d => savedChecks[d.id]).length;
    document.getElementById('done-count').textContent = done;
    document.getElementById('docs-bar').style.width = (docs.length > 0 ? Math.round(done/docs.length*100) : 0) + '%';
    if (el.checked) showToast('서류를 준비 완료로 표시했습니다.', 'success');
  }

  function showExample(title, content) {
    document.getElementById('modal-title').textContent = decodeURIComponent(title);
    document.getElementById('modal-content').textContent = decodeURIComponent(content);
    document.getElementById('example-modal').style.removeProperty('display');
  }

  function closeModal() {
    document.getElementById('example-modal').style.setProperty('display', 'none', 'important');
  }

  renderDocs();
</script>
</body>
</html>

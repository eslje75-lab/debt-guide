<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진단 결과 | 채무정리길잡이</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50">

<div id="header-placeholder"></div>

<section class="bg-blue-700 text-white py-8">
  <div class="max-w-4xl mx-auto px-4 text-center">
    <h1 class="text-2xl md:text-3xl font-bold mb-1">채무진단 결과</h1>
    <p id="result-date" class="text-blue-200 text-sm"></p>
  </div>
</section>

<div class="max-w-4xl mx-auto px-4 py-8">

  <!-- 참고 안내 -->
  <div class="disclaimer-box mb-6">
    <strong>⚠ 참고용 안내</strong><br>
    아래 결과는 입력하신 정보를 바탕으로 한 참고용 분석입니다.
    법률상담·법률대리·결과 보장이 아니며, 최종 판단은 법원 결정 및 전문가 검토에 따라 달라질 수 있습니다.
  </div>

  <!-- 결과 카드 3개 -->
  <div id="result-cards" class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
    <!-- JS로 렌더링 -->
  </div>

  <!-- 상세 섹션 -->
  <div id="rehab-detail" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-5">
    <!-- 개인회생 상세 (JS 렌더링) -->
  </div>

  <div id="bankrupt-detail" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-5">
    <!-- 개인파산 상세 (JS 렌더링) -->
  </div>

  <div id="credit-detail" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-5">
    <!-- 신용회복위원회 상세 (JS 렌더링) -->
  </div>

  <!-- 다음 단계 CTA -->
  <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6 mt-6">
    <h3 class="font-bold text-slate-800 mb-3">이제 어떻게 할까요?</h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <a href="rehabilitation.html" class="flex items-center gap-3 bg-white p-4 rounded-xl border border-slate-200 hover:border-blue-300 transition-colors card-hover">
        <span class="text-2xl">📋</span>
        <div>
          <div class="font-semibold text-slate-800 text-sm">개인회생 셀프 진행센터</div>
          <div class="text-xs text-slate-400">단계별 체크리스트·서류 안내</div>
        </div>
      </a>
      <a href="bankruptcy.html" class="flex items-center gap-3 bg-white p-4 rounded-xl border border-slate-200 hover:border-blue-300 transition-colors card-hover">
        <span class="text-2xl">⚖️</span>
        <div>
          <div class="font-semibold text-slate-800 text-sm">개인파산·면책 셀프 진행센터</div>
          <div class="text-xs text-slate-400">단계별 체크리스트·서류 안내</div>
        </div>
      </a>
      <a href="documents.html" class="flex items-center gap-3 bg-white p-4 rounded-xl border border-slate-200 hover:border-blue-300 transition-colors card-hover">
        <span class="text-2xl">📁</span>
        <div>
          <div class="font-semibold text-slate-800 text-sm">서류 체크센터</div>
          <div class="text-xs text-slate-400">필요 서류 목록·발급처 안내</div>
        </div>
      </a>
      <a href="ai-review.html" class="flex items-center gap-3 bg-white p-4 rounded-xl border border-slate-200 hover:border-blue-300 transition-colors card-hover">
        <span class="text-2xl">🤖</span>
        <div>
          <div class="font-semibold text-slate-800 text-sm">AI 서류 검토</div>
          <div class="text-xs text-slate-400">작성한 내용 참고 검토</div>
        </div>
      </a>
    </div>
  </div>

  <!-- 재진단 버튼 -->
  <div class="text-center mt-6">
    <a href="diagnosis.html" class="inline-block text-slate-500 text-sm hover:text-blue-700 underline">
      다시 진단하기
    </a>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="toast"></div>

<script src="js/main.js"></script>
<script>
  initPage('diagnosis');

  const LEVEL_CONFIG = {
    high:   { label: '검토 가능성 높음',  badge: 'badge-high',   card: 'result-high',   icon: '🟢' },
    medium: { label: '검토 가능성 보통',  badge: 'badge-medium', card: 'result-medium', icon: '🟡' },
    low:    { label: '검토 가능성 낮음',  badge: 'badge-low',    card: 'result-low',    icon: '⚪' },
  };

  function buildCard(title, levelKey, pros, cons, next) {
    const c = LEVEL_CONFIG[levelKey] || LEVEL_CONFIG.low;
    return `
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 ${c.card} card-hover">
        <div class="flex items-start justify-between mb-3">
          <h3 class="font-bold text-slate-800 text-base">${title}</h3>
          <span class="text-lg">${c.icon}</span>
        </div>
        <span class="inline-block text-xs font-semibold px-2.5 py-1 rounded-full ${c.badge} mb-4">${c.label}</span>
        <div class="space-y-3 text-sm">
          <div>
            <span class="text-green-700 font-semibold">장점</span>
            <p class="text-slate-600 mt-0.5 leading-relaxed">${pros}</p>
          </div>
          <div>
            <span class="text-amber-700 font-semibold">단점 · 주의</span>
            <p class="text-slate-600 mt-0.5 leading-relaxed">${cons}</p>
          </div>
          <div class="pt-2 border-t border-slate-100">
            <span class="text-blue-700 font-semibold">다음 단계</span>
            <p class="text-slate-600 mt-0.5 leading-relaxed">${next}</p>
          </div>
        </div>
      </div>
    `;
  }

  function renderResults() {
    const levels = Storage.load('diagnosis_levels') || { rehab:'low', bankrupt:'low', credit:'low' };
    const data   = Storage.load('diagnosis_data') || {};
    const repay  = Storage.load('diagnosis_repay') || {};
    const date   = Storage.load('diagnosis_date') || '';

    document.getElementById('result-date').textContent = date ? `진단일: ${date}` : '';

    // ── 결과 카드 3종 ──
    const cardsHtml =
      buildCard('개인회생', levels.rehab,
        '정기 소득을 유지하면서 채무의 일부만 변제하고 나머지를 면책받을 수 있습니다.',
        '3~5년간 변제계획을 이행해야 하며, 법원 신청·인가·변제 절차가 복잡합니다.',
        '개인회생 셀프 진행센터에서 단계별 준비를 시작해 보세요.') +
      buildCard('개인파산·면책', levels.bankrupt,
        '소득·재산이 없어 변제가 불가능한 경우 재산 정리 후 채무 전부를 면책받을 수 있습니다.',
        '면책불허가 사유(도박·낭비 등)가 있으면 면책이 거부될 수 있습니다.',
        '개인파산·면책 셀프 진행센터에서 준비 사항을 확인해 보세요.') +
      buildCard('신용회복위원회', levels.credit,
        '법원 절차 없이 이자 감면·분할 상환으로 채무를 조정할 수 있습니다.',
        '연체가 길거나 채무가 과다한 경우 조정이 어려울 수 있습니다.',
        '신용회복위원회 공식 사이트(ccrs.or.kr)에서 접수 가능합니다.');

    document.getElementById('result-cards').innerHTML = cardsHtml;

    // ── 개인회생 상세 (예상 변제금) ──
    const monthlyDisp = repay.monthly || 0;
    const total36     = repay.total36 || 0;
    const exempt      = repay.exempt  || 0;

    document.getElementById('rehab-detail').innerHTML = `
      <h3 class="font-bold text-slate-800 text-lg mb-1">📋 개인회생 · 예상 변제금 참고 계산</h3>
      <p class="text-slate-500 text-sm mb-4">입력하신 정보 기준으로 정기적인 소득이 있고 총 채무액이 소득 대비 높은 편이므로 개인회생 절차를 검토해볼 수 있습니다.</p>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
        <div class="bg-blue-50 rounded-xl p-4 text-center">
          <div class="text-xs text-slate-500 mb-1">월 변제 가능 추정액</div>
          <div class="text-xl font-bold text-blue-700">${formatWon(monthlyDisp)}</div>
          <div class="text-xs text-slate-400 mt-1">소득 - 생계비</div>
        </div>
        <div class="bg-blue-50 rounded-xl p-4 text-center">
          <div class="text-xs text-slate-500 mb-1">예상 총 변제금 (36개월)</div>
          <div class="text-xl font-bold text-blue-700">${formatWon(total36)}</div>
          <div class="text-xs text-slate-400 mt-1">월 변제액 × 36</div>
        </div>
        <div class="bg-green-50 rounded-xl p-4 text-center">
          <div class="text-xs text-slate-500 mb-1">예상 면책 가능 채무액</div>
          <div class="text-xl font-bold text-green-700">${formatWon(Math.max(0, exempt))}</div>
          <div class="text-xs text-slate-400 mt-1">총 채무 - 총 변제금</div>
        </div>
      </div>

      <div class="disclaimer-box">
        예상 변제금은 입력값을 바탕으로 단순 계산한 참고용 금액입니다.
        실제 변제금은 법원, 소득, 재산, 부양가족 수, 청산가치, 채권자 의견 등에 따라 달라질 수 있습니다.
      </div>
      <a href="rehabilitation.html" class="mt-4 inline-block bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-800 transition-colors">개인회생 진행센터 →</a>
    `;

    // ── 개인파산 상세 ──
    const income = data.monthlyIncome || 0;
    const assets = data.totalAssets   || 0;
    const debt   = data.totalDebt     || 0;
    document.getElementById('bankrupt-detail').innerHTML = `
      <h3 class="font-bold text-slate-800 text-lg mb-1">⚖️ 개인파산·면책 · 주요 검토 사항</h3>
      <p class="text-slate-500 text-sm mb-4">입력하신 정보 기준으로 현재 소득과 재산만으로 채무를 변제하기 어려운 상태일 가능성이 있습니다.</p>

      <div class="space-y-3">
        <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg">
          <span class="text-lg mt-0.5">${income < 500000 ? '🔴' : '🟡'}</span>
          <div>
            <div class="font-semibold text-sm text-slate-800">변제능력 부족 여부</div>
            <p class="text-xs text-slate-500 mt-0.5">
              ${income < 500000 ? '소득이 낮아 변제능력 부족 가능성이 있습니다.' : '소득이 있어 파산보다 회생 검토를 먼저 권장합니다.'}
            </p>
          </div>
        </div>
        <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg">
          <span class="text-lg mt-0.5">${assets < debt * 0.3 ? '🔴' : '🟡'}</span>
          <div>
            <div class="font-semibold text-sm text-slate-800">재산 처분 가능성</div>
            <p class="text-xs text-slate-500 mt-0.5">
              파산 시 보유 재산(일정 한도 초과분)은 파산재단에 편입될 수 있습니다.
              ${assets > 0 ? `보유 재산 약 ${formatWon(assets)} — 전문가 확인 권장` : '재산이 적어 처분 대상이 없을 수 있습니다.'}
            </p>
          </div>
        </div>
        <div class="flex items-start gap-3 p-3 bg-amber-50 rounded-lg border border-amber-100">
          <span class="text-lg mt-0.5">⚠️</span>
          <div>
            <div class="font-semibold text-sm text-slate-800">면책불허가 사유 확인 필요</div>
            <p class="text-xs text-slate-500 mt-0.5">도박·낭비·허위 재산신고·최근 신규 대출 등은 면책불허가 사유가 될 수 있습니다. 채무 발생 경위를 정확히 정리해야 합니다.</p>
          </div>
        </div>
      </div>

      <div class="disclaimer-box mt-4">
        면책 여부는 법원이 최종 결정합니다. 본 안내는 참고용이며 결과를 보장하지 않습니다.
      </div>
      <a href="bankruptcy.html" class="mt-4 inline-block bg-slate-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-800 transition-colors">개인파산 진행센터 →</a>
    `;

    // ── 신용회복위원회 상세 ──
    const arrears = data.arrearsMonths || 0;
    document.getElementById('credit-detail').innerHTML = `
      <h3 class="font-bold text-slate-800 text-lg mb-1">🏛️ 신용회복위원회 절차 안내</h3>
      <p class="text-slate-500 text-sm mb-4">연체기간과 채무상태에 따라 신용회복위원회의 채무조정 절차를 먼저 검토할 수 있습니다.</p>

      <div class="space-y-3">
        <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg">
          <span class="text-lg mt-0.5">${arrears <= 3 ? '🟢' : arrears <= 6 ? '🟡' : '🔴'}</span>
          <div>
            <div class="font-semibold text-sm text-slate-800">연체기간 기준 검토</div>
            <p class="text-xs text-slate-500 mt-0.5">
              ${arrears === 0 ? '연체 전·초기 단계로 신용회복위원회 사전채무조정이 가능할 수 있습니다.' :
                arrears <= 3 ? '연체 초기로 채무조정 가능성이 높습니다.' :
                arrears <= 6 ? '연체 중기로 조정 가능하나 조건에 따라 달라질 수 있습니다.' :
                '연체 기간이 길어 법원 절차 병행 검토를 권장합니다.'}
            </p>
          </div>
        </div>
        <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg">
          <span class="text-lg mt-0.5">ℹ️</span>
          <div>
            <div class="font-semibold text-sm text-slate-800">법원 절차 전 조정 가능성</div>
            <p class="text-xs text-slate-500 mt-0.5">신용회복위원회는 법원 신청 없이 이용 가능한 민간 채무조정 기관입니다. 법원 절차보다 절차가 간소하나, 채권자 동의가 필요합니다.</p>
          </div>
        </div>
      </div>

      <div class="disclaimer-box mt-4">
        신용회복위원회 절차는 법원 절차와 다르므로 공식 안내를 확인하는 것이 좋습니다.
      </div>
      <a href="https://www.ccrs.or.kr" target="_blank" rel="noopener"
         class="mt-4 inline-block bg-teal-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-teal-700 transition-colors">
        신용회복위원회 공식 사이트 →
      </a>
    `;
  }

  renderResults();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>진단 결과 | 챔로드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50">

<div id="header-placeholder"></div>

<section class="bg-blue-700 text-white py-8">
  <div class="max-w-4xl mx-auto px-4 text-center">
    <h1 class="text-2xl md:text-3xl font-bold mb-1">채무진단 결과</h1>
    <p id="result-date" class="text-blue-200 text-sm"></p>
  </div>
</section>

<div class="max-w-4xl mx-auto px-4 py-8">

  <!-- 참고 안내 -->
  <div class="disclaimer-box mb-6 flex items-start gap-2">
    <span class="shrink-0">⚠️</span>
    <span>아래 결과는 입력하신 정보를 바탕으로 한 참고용 분석입니다. 법률상담·법률대리·결과 보장이 아니며, 최종 판단은 법원 결정 및 전문가 검토에 따라 달라질 수 있습니다.</span>
  </div>

  <!-- 최적 절차 추천 배너 -->
  <div id="best-recommendation" class="mb-6"><!-- JS 렌더링 --></div>

  <!-- 적합도 카드 3개 -->
  <h2 class="text-base font-bold text-slate-700 mb-3">절차별 적합도 분석</h2>
  <div id="result-cards" class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
    <!-- JS 렌더링 -->
  </div>

  <!-- 상세 섹션 (점수 순으로 동적 정렬, 아코디언) -->
  <div id="detail-sections-container">
    <div id="rehab-detail"    data-type="rehab"    class="bg-white rounded-2xl shadow-sm border border-slate-100 mb-5 overflow-hidden"></div>
    <div id="bankrupt-detail" data-type="bankrupt" class="bg-white rounded-2xl shadow-sm border border-slate-100 mb-5 overflow-hidden"></div>
    <div id="credit-detail"   data-type="credit"   class="bg-white rounded-2xl shadow-sm border border-slate-100 mb-5 overflow-hidden"></div>
  </div>

  <!-- 다음 단계 CTA -->
  <div class="bg-blue-50 border border-blue-100 rounded-2xl p-6 mt-6">
    <h3 class="font-bold text-slate-800 mb-0.5">개인회생, 파산·면책 해당 시</h3>
    <p class="text-xs text-slate-500 mb-3">단계별 셀프 진행 가이드를 제공합니다</p>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <a href="rehabilitation.html" class="flex items-center gap-3 bg-white p-4 rounded-xl border border-slate-200 hover:border-blue-300 transition-colors card-hover">
        <span class="text-2xl">📋</span>
        <div>
          <div class="font-semibold text-slate-800 text-sm">개인회생 셀프 진행센터</div>
          <div class="text-xs text-slate-400">단계별 체크리스트·서류 안내</div>
        </div>
      </a>
      <a href="bankruptcy.html" class="flex items-center gap-3 bg-white p-4 rounded-xl border border-slate-200 hover:border-blue-300 transition-colors card-hover">
        <span class="text-2xl">⚖️</span>
        <div>
          <div class="font-semibold text-slate-800 text-sm">개인파산·면책 셀프 진행센터</div>
          <div class="text-xs text-slate-400">단계별 체크리스트·서류 안내</div>
        </div>
      </a>
    </div>
  </div>

  <!-- 재진단 버튼 -->
  <div class="text-center mt-6">
    <a href="diagnosis.html" class="inline-block text-slate-500 text-sm hover:text-blue-700 underline">
      다시 진단하기
    </a>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="toast"></div>

<script src="js/main.js"></script>
<script>
  initPage('diagnosis');

  // ── 신청 불가 → 강제 0% 처리 ──
  function applyHardBlocks(scores, data) {
    const s         = { rehab: scores.rehab || 0, bankrupt: scores.bankrupt || 0, credit: scores.credit || 0 };
    const priors    = data.priorAdjustments || [];
    const unsecured = data.unsecuredDebt || 0;
    const secured   = data.securedDebt   || 0;

    // 이전 채무조정 이력 기반 불가
    if (priors.includes('rehab-done-recent')    || priors.includes('rehab-ongoing'))    s.rehab    = 0;
    if (priors.includes('bankrupt-done-recent') || priors.includes('bankrupt-ongoing')) s.bankrupt = 0;
    if (priors.includes('ccrs-ongoing'))                                                s.credit   = 0;

    // 채무한도 초과 → 신청 자체 불가
    if (unsecured > 1_000_000_000 || secured > 1_500_000_000) s.rehab  = 0; // 무담보 10억·담보 15억 초과
    if (unsecured > 500_000_000   || secured > 1_000_000_000) s.credit = 0; // 무담보 5억·담보 10억 초과

    return s;
  }

  // ── 신청불가 사유 반환 (있으면 문자열, 없으면 null) ──
  function getHardBlockReason(type, data) {
    const unsecured = data.unsecuredDebt    || 0;
    const secured   = data.securedDebt      || 0;
    const priors    = data.priorAdjustments || [];
    if (type === 'rehab') {
      if (priors.includes('rehab-done-recent')) return '개인회생 면책 확정 후 5년 미경과 — 법적 재신청 불가';
      if (priors.includes('rehab-ongoing'))     return '현재 개인회생 진행 중 — 중복 신청 불가';
      if (unsecured > 1_000_000_000) return `무담보 채무(${formatWon(unsecured)})가 법정 한도(10억) 초과`;
      if (secured   > 1_500_000_000) return `담보 채무(${formatWon(secured)})가 법정 한도(15억) 초과`;
    }
    if (type === 'bankrupt') {
      if (priors.includes('bankrupt-done-recent')) return '파산 면책 확정 후 7년 미경과 — 법적 재신청 불가';
      if (priors.includes('bankrupt-ongoing'))     return '현재 개인파산 진행 중 — 중복 신청 불가';
    }
    if (type === 'credit') {
      if (priors.includes('ccrs-ongoing'))   return '현재 신용회복위원회 진행 중 — 중복 신청 불가';
      if (unsecured > 500_000_000)  return `무담보 채무(${formatWon(unsecured)})가 신청 한도(무담보 5억) 초과`;
      if (secured   > 1_000_000_000) return `담보 채무(${formatWon(secured)})가 신청 한도(담보 10억) 초과`;
    }
    return null;
  }

  // ── 신용회복위원회 채무조정제도: 해당 세부 프로그램 판별 ──
  function getCCRSPrograms(data) {
    const arrears    = data.arrearsMonths || 0;
    const hasFinance = (data.debtTypes || []).some(t => ['bank','savings','card','insurance'].includes(t));
    const isSelf     = ['current', 'closed'].includes(data.businessStatus || '');
    const unsecured  = data.unsecuredDebt || 0;
    const secured    = data.securedDebt   || 0;
    const priors     = data.priorAdjustments || [];

    if (!hasFinance || unsecured > 500_000_000 || secured > 1_000_000_000 || priors.includes('ccrs-ongoing')) return [];

    const list = [];
    if ((arrears === 0 || arrears === 1) && data.hasIncome)
      list.push({ name:'사전채무조정 (프리워크아웃)', tag:'연체 전~30일 이내',
                  desc:'연체 발생 전 또는 초기에 선제적으로 채무조정을 신청하는 제도' });
    if (arrears === 2)
      list.push({ name:'신속채무조정', tag:'연체 1~3개월',
                  desc:'연체 31~89일 단계에서 신속하게 채무조정을 처리하는 제도' });
    if (arrears >= 5)
      list.push({ name:'개인워크아웃', tag:'연체 3개월 이상',
                  desc:'연체 90일 이상 또는 신용불량 채무자 대상 일반 채무조정 제도' });
    if (isSelf)
      list.push({ name:'개인사업자 채무조정', tag:'개인사업자·자영업자',
                  desc:'영업 중이거나 폐업한 개인사업자의 사업 관련 채무를 조정하는 제도' });
    if (data.hasHealthIssues || (!data.hasIncome && (data.totalAssets || 0) < 5_000_000))
      list.push({ name:'취약차주 채무조정', tag:'취약계층',
                  desc:'질병·장애·기초수급 등 취약계층을 위한 특별 지원 채무조정 제도' });

    return list;
  }

  // ── 점수별 색상 설정 ──
  function scoreTheme(score) {
    if (score >= 60) return { text:'text-green-700', bar:'bg-green-500', border:'border-green-300', label:'적합' };
    if (score >= 30) return { text:'text-amber-700', bar:'bg-amber-400', border:'border-amber-300', label:'조건부 검토' };
    if (score >  0)  return { text:'text-slate-400', bar:'bg-slate-300', border:'border-slate-200', label:'부적합' };
    return { text:'text-red-500', bar:'bg-red-200', border:'border-red-100', label:'불가' };
  }

  // ── 설문 데이터 기반 개인화 사유 생성 ──
  function buildReasons(data, type, hardBlocked = {}) {
    const pros = [], cons = [];
    const income      = data.monthlyIncome  || 0;
    const living      = data.monthlyLiving  || 0;
    const disposable  = income - living;
    const unsecured   = data.unsecuredDebt  || 0;
    const secured     = data.securedDebt    || 0;
    const totalDebt   = data.totalDebt      || 0;
    const totalAssets = data.totalAssets    || 0;
    const arrears     = data.arrearsMonths  || 0;
    const priors      = data.priorAdjustments || [];
    const causes      = data.debtCauses     || [];
    const debtTypes   = data.debtTypes      || [];
    const hasFinance  = debtTypes.some(t => ['bank','savings','card','insurance'].includes(t));

    if (type === 'rehab') {
      // 유리한 점
      if (data.hasIncome && income > 0)
        pros.push(`정기소득 있음 (월 ${formatWon(income)}) — 변제계획 수립의 핵심 조건 충족`);
      if (disposable > 0)
        pros.push(`<span class="term-tip" data-tip="월 소득에서 생활비를 뺀 금액. 채무조정에서 실제 변제 여력을 나타내는 용어로 사용됩니다.">가처분소득</span> 월 ${formatWon(disposable)} → 3년 총 변제 가능 추정액 약 ${formatWon(disposable * 36)}`);
      if (unsecured > 0 && unsecured <= 1_000_000_000)
        pros.push(`무담보 채무 ${formatWon(unsecured)} — 법정 신청 한도(10억) 이내`);
      if (secured > 0 && secured <= 1_500_000_000)
        pros.push(`담보 채무 ${formatWon(secured)} — 법정 신청 한도(15억) 이내`);
      if (arrears > 0)
        pros.push('연체 중 — 회생 인가 후 추심·압류 자동 중지 효과 기대 가능');

      // 불리한 점
      if (!data.hasIncome || income === 0)
        cons.push('소득 없음 — 변제계획 수립 불가, 개인파산 검토가 우선됩니다');
      else if (disposable <= 0)
        cons.push(`소득(${formatWon(income)})이 생활비(${formatWon(living)})에 미달 — 변제 여력 없음`);
      if (unsecured > 1_000_000_000)
        cons.push(`무담보 채무(${formatWon(unsecured)})가 법정 한도(10억) 초과 — 개인회생 신청 자체가 불가`);
      if (secured > 1_500_000_000)
        cons.push(`담보 채무(${formatWon(secured)})가 법정 한도(15억) 초과 — 개인회생 신청 자체가 불가`);
      if (priors.includes('rehab-done-recent'))
        cons.push('개인회생 면책 확정 후 5년 미경과 — 법적으로 재신청 불가 상태');
      if (priors.includes('rehab-ongoing'))
        cons.push('현재 개인회생 진행 중 — 중복 신청 불가');
    }

    if (type === 'bankrupt') {
      // 유리한 점
      if (hardBlocked.rehab)
        pros.push(`개인회생 신청 불가 — 채무 규모 초과 또는 재신청 대기기간으로 인해 법원 절차 중 파산이 유일한 선택`);
      if (!data.hasIncome || income === 0)
        pros.push('소득 없음 — 변제 불능 상태로 파산의 핵심 요건에 해당');
      else if (income < living)
        pros.push(`소득(${formatWon(income)})이 최소 생활비(${formatWon(living)})에 미달 — 변제 불능 상태`);
      if (totalDebt > 0 && totalAssets < totalDebt * 0.2)
        pros.push(`총 재산(${formatWon(totalAssets)})이 총 채무(${formatWon(totalDebt)})의 20%에도 못 미쳐 채무초과 상태`);
      if (totalAssets < 5_000_000)
        pros.push('보유 재산이 거의 없어 파산재단 편입 부담이 적음');
      if (arrears >= 18)
        pros.push('1년 이상 장기 연체 — 변제 의사·능력 부재 상태로 파산 요건 충족 가능성 높음');

      // 불리한 점
      if (data.hasIncome && disposable > 0 && !hardBlocked.rehab)
        cons.push(`<span class="term-tip" data-tip="월 소득에서 생활비를 뺀 금액. 채무조정에서 실제 변제 여력을 나타내는 용어로 사용됩니다.">가처분소득</span>이 월 ${formatWon(disposable)} 발생 — 변제 여력이 있어 개인회생이 더 적합할 수 있음`);
      if (causes.includes('gambling'))
        cons.push('도박·사행성 채무 포함 — 면책불허가 사유(법 제564조) 해당 가능, 면책이 거부될 위험 있음');
      if (priors.includes('bankrupt-done-recent'))
        cons.push('파산 면책 확정 후 7년 미경과 — 법적으로 재신청 불가 상태');
      if (priors.includes('bankrupt-denied'))
        cons.push('이전 면책불허가 결정 이력 있음 — 재신청 시 심사에서 불리하게 작용');
      if (priors.includes('bankrupt-ongoing'))
        cons.push('현재 개인파산 진행 중 — 중복 신청 불가');
    }

    if (type === 'credit') {
      // 유리한 점
      if (hasFinance)
        pros.push('금융기관(은행·카드사·저축은행 등) 채무 포함 — 신용회복위원회 채무조정 대상 해당');
      if (data.hasIncome && income > 0)
        pros.push(`소득 있음 (월 ${formatWon(income)}) — 분할상환 계획 수립 가능`);
      if (arrears === 0)
        pros.push('현재 연체 없음 — 사전채무조정(프리워크아웃) 신청 가능');
      else if (arrears <= 3)
        pros.push(`연체 초기(${arrears}개월) — 사전채무조정(프리워크아웃)·신속채무조정 신청 가능 구간`);

      // 불리한 점
      if (debtTypes.includes('loan'))
        cons.push('대부업 채무 포함 — 대부업체는 신용회복위원회 협약 미가입이 대부분. 비협약 채권자 채무가 전체의 20% 이상이면 채무조정이 기각됩니다. 개인회생 병행 검토 권장');
      if (!hasFinance)
        cons.push('금융기관 채무 없음 — 신용회복위원회 조정 대상이 아닐 수 있음(대부업·세금채무 제외)');
      if (!data.hasIncome || income === 0)
        cons.push('소득 없음 — 분할상환 계획 수립 어려워 조정 승인 가능성 낮음');
      if (arrears > 12)
        cons.push(`장기 연체(${arrears}개월) — 채권자 동의 획득 어려울 수 있음`);
      if (unsecured > 500_000_000)
        cons.push(`무담보 채무(${formatWon(unsecured)})가 신청 한도(무담보 5억) 초과 — 신청 불가`);
    }

    return { pros, cons };
  }

  // ── 적합도 카드 ──
  function buildCard(title, type, score, data, hardBlocked = {}) {
    const th = scoreTheme(score);
    const { pros, cons } = buildReasons(data, type, hardBlocked);
    const icons = { rehab:'📋', bankrupt:'⚖️', credit:'🏛️' };
    const blockReason = getHardBlockReason(type, data);

    // 신청불가 카드
    if (score === 0 && blockReason) {
      return `
        <div class="bg-white rounded-2xl shadow-sm border border-red-100 p-5 flex flex-col">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-start gap-2 font-bold text-slate-800 text-base">
              <span class="shrink-0">${icons[type]}</span><span>${title}</span>
            </div>
            <div class="shrink-0 ml-3 bg-red-50 border border-red-200 rounded-lg px-3 py-1.5 text-center">
              <div class="text-sm font-extrabold text-red-600 leading-none">신청불가</div>
            </div>
          </div>
          <div class="bg-red-50 border border-red-100 rounded-lg px-3 py-2.5 text-xs text-red-700 leading-relaxed">
            <span class="font-semibold">사유:</span> ${blockReason}
          </div>
        </div>`;
    }

    const prosHtml = pros.slice(0, 3).map(p =>
      `<li class="flex gap-2 text-xs text-slate-600 leading-snug">
         <span class="text-green-500 shrink-0 font-bold mt-0.5">✓</span><span>${p}</span>
       </li>`).join('');

    const consHtml = cons.slice(0, 3).map(c =>
      `<li class="flex gap-2 text-xs text-slate-600 leading-snug">
         <span class="text-red-400 shrink-0 font-bold mt-0.5">✗</span><span>${c}</span>
       </li>`).join('');

    // 신용회복위원회 전용: 해당 세부 프로그램 칩
    let ccrsChips = '';
    if (type === 'credit' && score > 0) {
      const programs = getCCRSPrograms(data);
      if (programs.length > 0) {
        const chips = programs.map(p =>
          `<span class="inline-block bg-teal-50 text-teal-700 border border-teal-200 text-xs px-2 py-0.5 rounded-full">${p.name}</span>`
        ).join('');
        ccrsChips = `<div class="mb-3"><p class="text-xs font-semibold text-teal-700 mb-1.5">신청 가능한 세부 제도</p><div class="flex flex-wrap gap-1">${chips}</div></div>`;
      }
    }

    return `
      <div class="bg-white rounded-2xl shadow-sm border ${th.border} p-5 flex flex-col">

            <div class="text-xs ${th.text} mt-0.5">${th.label}</div>
          </div>
        </div>
        <div class="h-2 bg-slate-100 rounded-full mb-4 overflow-hidden">
          <div class="${th.bar} h-full rounded-full" style="width:${Math.round(score)}%"></div>
        </div>
        ${ccrsChips}
        ${pros.length ? `
        <div class="mb-3">
          <p class="text-xs font-semibold text-green-700 mb-1.5">귀하의 상황에 유리한 점</p>
          <ul class="space-y-1.5">${prosHtml}</ul>
        </div>` : ''}
        ${cons.length ? `

          <p class="text-xs font-semibold text-red-600 mb-1.5">주의 또는 불리한 점</p>
          <ul class="space-y-1.5">${consHtml}</ul>

  // ── 최적 절차 추천 배너 ──
  function buildBanner(scores, data, hardBlocked = {}) {
    const list = [
      { type:'rehab',    title:'개인회생',                  score: scores.rehab    },
      { type:'bankrupt', title:'개인파산·면책',              score: scores.bankrupt },
      { type:'credit',   title:'신용회복위원회 채무조정제도', score: scores.credit   },
    ].sort((a, b) => b.score - a.score);

    const best   = list[0];
    const second = list[1];
    const gap    = best.score - second.score;

    // 세 절차 모두 신청불가
    if (best.score === 0 && hardBlocked.rehab && hardBlocked.bankrupt && hardBlocked.credit) {
      return `<div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center">
        <p class="text-red-700 font-bold text-base mb-1">현재 신청 가능한 채무조정 절차가 없습니다</p>
        <p class="text-slate-500 text-sm">채무조정 이력 또는 채무 규모로 인해 세 가지 절차 모두 신청이 어려운 상태입니다. 법률전문가 상담이 필요합니다.</p>
      </div>`;
    }

    // 최고 점수가 너무 낮으면 안내 메시지 변경
    if (best.score < 20) {
      return `<div class="bg-slate-100 border border-slate-200 rounded-2xl p-5 text-center">
        <p class="text-slate-600 font-semibold">입력하신 정보만으로는 적합한 절차를 특정하기 어렵습니다.</p>
        <p class="text-slate-400 text-sm mt-1">전문가 상담 또는 추가 정보 입력을 권장드립니다.</p>
      </div>`;
    }

    // Fix 12: 세 절차 모두 55% 이상이면 특별 배너
    if (scores.rehab >= 55 && scores.bankrupt >= 55 && scores.credit >= 55) {
      return `
        <div class="bg-gradient-to-r from-emerald-700 to-teal-600 text-white rounded-2xl p-6">
          <div class="flex items-center gap-2 text-emerald-200 text-sm font-semibold mb-2">
            <span>✅</span> 세 가지 절차 모두 적합한 상황
          </div>
          <p class="text-lg font-bold mb-2">다양한 채무조정 옵션을 선택할 수 있습니다</p>
          <p class="text-emerald-100 text-sm mb-3">입력하신 조건상 신용회복위원회·개인회생·개인파산 모두 적합도가 높습니다. 각 절차의 장단점을 비교해 본인 상황에 맞는 절차를 선택하세요.</p>
          <div class="grid grid-cols-3 gap-3">
            <div class="bg-white/15 rounded-xl p-3 text-center">
              <div class="text-xl font-extrabold">${Math.round(scores.credit)}%</div>
              <div class="text-emerald-200 text-xs">신용회복위원회</div>
            </div>
            <div class="bg-white/15 rounded-xl p-3 text-center">
              <div class="text-xl font-extrabold">${Math.round(scores.rehab)}%</div>
              <div class="text-emerald-200 text-xs">개인회생</div>
            </div>
            <div class="bg-white/15 rounded-xl p-3 text-center">
              <div class="text-xl font-extrabold">${Math.round(scores.bankrupt)}%</div>
              <div class="text-emerald-200 text-xs">개인파산·면책</div>
            </div>
          </div>
          <p class="text-emerald-200 text-xs mt-3">💡 일반적으로 신용회복위원회 → 개인회생 → 개인파산 순으로 부담이 커집니다. 신용회복위원회부터 시도하는 것을 권장드립니다.</p>
        </div>`;
    }

    const dualNote = gap <= 20 && second.score >= 30
      ? `<p class="text-blue-100 text-sm mt-2">
           <strong>${second.title}</strong>도 적합도 ${Math.round(second.score)}%로 동시 검토 가능합니다.
           두 절차의 장단점을 아래 카드에서 비교해 보세요.
         </p>`
      : '';

    // Fix 11: 도박 채무 + 파산 1위일 때 면책불허가 경고
    const gamblingWarning = (data.debtTypes || []).includes('gambling') && best.type === 'bankrupt'
      ? `<div class="mt-4 bg-red-500/20 border border-red-300/50 rounded-xl p-4">
          <p class="text-red-100 font-bold text-sm mb-1">⚠️ 면책불허가 사유 주의</p>
          <p class="text-red-100 text-xs">도박·투기로 인한 채무는 파산법상 <strong>면책불허가 사유</strong>에 해당할 수 있습니다. 파산선고를 받더라도 면책이 거부되면 채무가 소멸되지 않습니다. 반드시 법률전문가 상담 후 진행하세요.</p>

    const th = scoreTheme(best.score);
    const icons = { rehab:'📋', bankrupt:'⚖️', credit:'🏛️' };

    return `

        <div class="flex items-center gap-2 text-blue-200 text-sm font-semibold mb-2">

          <div>
            <h2 class="text-2xl font-extrabold">${icons[best.type]} ${best.title}</h2>

            <div class="text-4xl font-extrabold">${Math.round(best.score)}%</div>
            <div class="text-blue-200 text-xs mt-1">적합도</div>
          </div>
        </div>
        ${gamblingWarning}
      </div>`;
  }

  // ── 최적 절차 선택 이유 한 줄 요약 ──
  function buildBestReason(data, type) {
    const income     = data.monthlyIncome || 0;
    const living     = data.monthlyLiving || 0;
    const disposable = income - living;
    const arrears    = data.arrearsMonths || 0;

    if (type === 'rehab') {
      if (disposable > 0)
        return `정기소득(월 ${formatWon(income)})과 변제 여력(월 ${formatWon(disposable)})이 있어 채무 일부 변제 후 면책이 가능한 구조입니다.`;
      return '소득이 있고 채무조정이 필요한 상황으로, 개인회생 절차 검토를 권장합니다.';
    }
    if (type === 'bankrupt') {
      const unsecured = data.unsecuredDebt || 0;
      const secured   = data.securedDebt   || 0;
      const priors    = data.priorAdjustments || [];
      if (unsecured > 1_000_000_000 || secured > 1_500_000_000)
        return `채무가 개인회생 법정 한도(무담보 10억·담보 15억)를 초과해 법원 절차 중 개인파산이 유일한 선택입니다.`;
      if (priors.includes('rehab-done-recent') || priors.includes('rehab-ongoing'))
        return `개인회생 신청이 불가한 상황으로, 법원을 통한 채무 해결은 개인파산·면책이 유일한 방법입니다.`;
      if (!data.hasIncome || income === 0)
        return '현재 소득이 없어 변제 자체가 불가능한 상태로, 파산·면책 절차가 가장 현실적인 해결책입니다.';
      return '소득이 생활비에 미달하거나 재산보다 채무가 현저히 많아 파산 절차 검토를 권장합니다.';
    }
    if (type === 'credit') {
      if (arrears === 0)
        return '현재 연체가 없어 법원 절차 전에 신용회복위원회 사전채무조정(프리워크아웃)을 먼저 시도할 수 있습니다.';
      return '금융기관 채무가 있고 소득이 있어 신용회복위원회를 통한 이자 감면·분할상환 조정이 가능한 상황입니다.';
    }
    return '';
  }

  // ── 절차 선택 도우미: 점수 근접한 두 절차 간 개인화 비교 (3가지 쌍 처리) ──
  function buildTossupAdvice(scores, data, repay) {
    const OPTS = [
      { type: 'rehab',    score: scores.rehab,    title: '개인회생',         subj: '이', icon: '📋', border: 'border-blue-200',  bg: 'bg-blue-50/30',   iconCls: 'text-blue-500',  titleCls: 'text-blue-700'  },
      { type: 'bankrupt', score: scores.bankrupt,  title: '개인파산·면책',     subj: '이', icon: '⚖️', border: 'border-slate-200', bg: 'bg-slate-50/40',  iconCls: 'text-slate-500', titleCls: 'text-slate-700' },
      { type: 'credit',   score: scores.credit,    title: '신용회복위원회',   subj: '가', icon: '🏛️', border: 'border-teal-200',  bg: 'bg-teal-50/30',   iconCls: 'text-teal-500',  titleCls: 'text-teal-700'  },
    ].filter(x => x.score >= 30).sort((a, b) => b.score - a.score);

    if (OPTS.length < 2 || OPTS[0].score - OPTS[1].score > 20) return '';

    const A = OPTS[0], B = OPTS[1];
    const pair = [A.type, B.type].sort().join('+'); // 항상 알파벳 순으로 정렬된 키

    // 공통 데이터
    const income      = data.monthlyIncome || 0;
    const living      = data.monthlyLiving || 0;
    // repay.monthly·total36은 표준생계비(기준중위소득 60%) 공제 후 실제 변제 여력 — 진단 시 저장된 값 사용
    const disposable  = repay.monthly || 0;
    const repayable36 = repay.total36  || 0;
    const totalDebt   = data.totalDebt    || 0;
    const totalAssets = data.totalAssets  || 0;
    const arrears     = data.arrearsMonths || 0;
    const debtTypes   = data.debtTypes    || [];
    const hasNonFinanceDebt = debtTypes.some(t => !['bank','savings','card','insurance'].includes(t));

    // A, B 각각의 유리한 요인 배열 (type 기준으로 push 대상 결정)
    const factorMap = { [A.type]: [], [B.type]: [] };
    const push = (type, item) => factorMap[type].push(item);

    // ── 쌍별 요인 분석 ──

    if (pair === 'credit+rehab') {
      // 압류·법적 조치
      if (data.hasLegalAction)
        push('rehab', { text: '압류·법적 조치 진행 중', weight: 3,
          reason: '개인회생 신청 즉시 모든 강제집행·추심이 법원 명령으로 전면 정지됩니다. 신용회복위원회는 추심 독촉만 중단되며 압류·경매를 막지 못합니다.' });
      else
        push('credit', { text: '법적 조치 없음', weight: 1,
          reason: '압류·소송이 없으므로 법원을 거치지 않고 신용회복위원회로 먼저 시도할 수 있습니다.' });
      // 원금 감면 필요성
      if (totalDebt > 0) {
        const r = repayable36 / totalDebt;
        if (r < 0.35)
          push('rehab', { text: '원금 대폭 감면 필요', weight: 3,
            reason: `3년 변제 추정액(${formatWon(repayable36)})이 총 채무의 ${Math.round(r*100)}%에 불과합니다. 신용회복위원회는 주로 이자·연체료만 감면하므로, 원금을 크게 줄이려면 개인회생이 필요합니다.` });
        else if (r >= 0.75)
          push('credit', { text: '분할상환으로 거의 해결 가능', weight: 2,
            reason: `3년 변제 추정액(${formatWon(repayable36)})으로 총 채무의 약 ${Math.round(r*100)}%를 상환할 수 있어, 이자 감면만으로도 충분히 해결될 수 있습니다.` });
      }
      // 연체 기간
      if (arrears <= 1)
        push('credit', { text: '연체 초기 — 프리워크아웃 가능', weight: 2,
          reason: '연체가 없거나 초기라면 사전채무조정(프리워크아웃)을 신청해 신용 영향을 최소화할 수 있습니다.' });
      else if (arrears === 2)  // 1~3개월 — 신속채무조정 가능 구간
        push('credit', { text: '연체 1~3개월 — 신속채무조정 신청 가능', weight: 1,
          reason: '신용회복위원회 신속채무조정(연체 31~89일) 신청이 가능한 구간입니다. 법원 절차 전에 먼저 시도해볼 수 있습니다.' });
      else if (arrears === 5)  // 3~6개월 — 장기화 경계, 채권자 동의 불확실
        push('rehab', { text: '연체 3~6개월 — 채권자 동의 불확실', weight: 1,
          reason: '연체 3개월을 넘기면 채권자 동의가 필요한 신용회복위원회 조정이 어려워질 수 있습니다. 법원이 직권 인가하는 개인회생을 병행 검토할 시점입니다.' });
      else if (arrears >= 9)
        push('rehab', { text: `장기 연체(${arrears >= 18 ? '1년' : '6개월~1년'})`, weight: 2,
          reason: '채권자 동의 없이 법원이 직권 인가하는 개인회생이 채무 해결의 확실성 면에서 더 유리합니다.' });
      // 비금융 채무
      if (hasNonFinanceDebt)
        push('rehab', { text: '사채·세금 등 비금융 채무 포함', weight: 2,
          reason: '신용회복위원회는 금융기관 채무만 조정합니다. 개인회생은 모든 채무를 일괄 처리합니다.' });
      // 소득 안정성
      if (['employed_insured', 'pension'].includes(data.incomeType) && disposable > 0)
        push('rehab', { text: '안정적 소득 — 변제계획 완수 가능', weight: 1,
          reason: '4대보험 직장인·연금 수급자는 소득 증빙이 쉽고 36개월 변제계획을 안정적으로 이행할 수 있습니다.' });
      // 절차 간소성 (조용한 상황에서만)
      if (!data.hasLegalAction && arrears <= 3 && !hasNonFinanceDebt)
        push('credit', { text: '절차 간소 — 서류·비용 부담 적음', weight: 1,
          reason: '법원 서류 없이 신청 가능하고 비용도 거의 없습니다.' });
    }

    else if (pair === 'bankrupt+rehab') {
      // 개인회생 유리한 이유
      if (data.hasLegalAction)
        push('rehab', { text: '압류·법적 조치 진행 중 — 즉시 정지 가능', weight: 3,
          reason: '개인회생 신청 즉시 법원 보전처분으로 강제집행이 멈춥니다. 개인파산은 파산선고 후에야 집행이 정지되어 수개월 지연될 수 있습니다.' });
      if (disposable > 0)
        push('rehab', { text: '변제 여력 있음', weight: 3,
          reason: `월 ${formatWon(disposable)}의 가처분소득이 있습니다. 변제 능력이 있는 상황에서 법원은 파산보다 개인회생을 우선 검토하며, 36개월 변제 완수 후 나머지 채무를 면책받을 수 있습니다.` });
      if (totalAssets >= 10_000_000)
        push('rehab', { text: '보유 재산 있음 — 파산재단 편입 방지', weight: 2,
          reason: `보유 재산(${formatWon(totalAssets)})이 파산 시 파산재단에 편입되어 처분될 수 있습니다. 개인회생은 재산을 유지하며 채무를 조정할 수 있습니다.` });
      if (!(data.debtCauses || []).includes('gambling'))
        push('rehab', { text: '면책불허가 사유 없음', weight: 1,
          reason: '도박·사행성 채무 등 면책불허가 사유가 없어 개인회생 인가 가능성이 높습니다.' });
      // 개인파산 유리한 이유
      if (!data.hasIncome || income === 0)
        push('bankrupt', { text: '소득 없음 — 변제계획 수립 불가', weight: 3,
          reason: '소득이 없으면 개인회생의 변제계획을 수립·이행할 수 없습니다. 파산·면책이 채무를 해소할 수 있는 현실적인 수단입니다.' });
      else if (income < living)
        push('bankrupt', { text: `소득(${formatWon(income)})이 생활비(${formatWon(living)})에 미달`, weight: 3,
          reason: '생활비조차 안 되는 소득으로는 변제 여력이 없습니다. 변제 불능 상태로 파산 요건에 해당합니다.' });
      if (totalDebt > 0 && repayable36 < totalDebt * 0.1 && disposable >= 0)
        push('bankrupt', { text: '채무 규모가 변제 여력 대비 과도', weight: 2,
          reason: `3년 최대 변제액(${formatWon(repayable36)})이 총 채무(${formatWon(totalDebt)})의 ${Math.round(repayable36/totalDebt*100)}%에 불과합니다. 사실상 변제 불능에 가까운 상태입니다.` });
      if (totalAssets < 5_000_000)
        push('bankrupt', { text: '재산 거의 없음 — 파산재단 부담 없음', weight: 2,
          reason: '처분할 재산이 없어 파산 절차에서 재산 손실 부담이 없습니다. 면책 결정 시 모든 채무에서 벗어날 수 있습니다.' });
      if (data.hasHealthIssues)
        push('bankrupt', { text: '건강 문제 — 소득 회복 전망 불투명', weight: 2,
          reason: '장기적으로 소득 창출이 어려운 상황이라면 36개월 변제 의무를 지는 개인회생보다 파산·면책으로 채무를 빠르게 해소하는 것이 현실적입니다.' });
      if (arrears >= 18)
        push('bankrupt', { text: `장기 연체(${arrears}개월) — 지급불능 상태`, weight: 1,
          reason: '1년 6개월 이상의 연체는 지급불능 상태에 해당할 가능성이 높아 파산 요건에 부합합니다.' });
    }

    else if (pair === 'bankrupt+credit') {
      // 신용회복위원회 유리한 이유
      if (data.hasIncome && income > 0)
        push('credit', { text: '소득 있음 — 분할상환 계획 수립 가능', weight: 3,
          reason: `소득(월 ${formatWon(income)})이 있어 분할상환 계획을 이행할 수 있습니다. 변제 능력이 있는 상황에서 파산은 법원 심사 시 불리할 수 있으므로, 신용회복위원회를 먼저 시도하는 것이 합리적입니다.` });
      if (arrears <= 3)
        push('credit', { text: '연체 초기 단계', weight: 2,
          reason: '연체가 길지 않아 채권자 동의 가능성이 비교적 높습니다.' });
      if (!hasNonFinanceDebt)
        push('credit', { text: '금융기관 채무 위주', weight: 1,
          reason: '은행·카드사 채무만 있다면 신용회복위원회 조정 대상에 모두 해당합니다.' });
      // 개인파산 유리한 이유
      if (!data.hasIncome || income === 0)
        push('bankrupt', { text: '소득 없음 — 분할상환 이행 불가', weight: 3,
          reason: '소득이 없으면 신용회복위원회의 분할상환 계획을 이행하기 어렵습니다. 파산·면책이 더 현실적인 해결책입니다.' });
      if (hasNonFinanceDebt)
        push('bankrupt', { text: '사채·세금 등 비금융 채무 포함', weight: 2,
          reason: '신용회복위원회 조정 대상이 아닌 채무가 있어, 모든 채무를 일괄 처리하는 파산이 더 완전한 해결책입니다.' });
      if (arrears >= 9)
        push('bankrupt', { text: `장기 연체(${arrears}개월)`, weight: 2,
          reason: '장기 연체 상태에서 채권자 동의가 필요한 신용회복위원회 조정은 성사되기 어렵습니다.' });
      if (totalAssets < 5_000_000)
        push('bankrupt', { text: '재산 거의 없음 — 파산재단 부담 없음', weight: 1,
          reason: '처분할 재산이 없어 파산 절차에서 재산 손실 부담이 없습니다.' });
    }

    else return ''; // 알 수 없는 쌍

    const aFactors = factorMap[A.type];
    const bFactors = factorMap[B.type];
    if (aFactors.length === 0 && bFactors.length === 0) return '';

    // ── 종합 판단 ──
    const aw = aFactors.reduce((s, f) => s + f.weight, 0);
    const bw = bFactors.reduce((s, f) => s + f.weight, 0);
    const winner = aw >= bw + 2 ? A : bw >= aw + 2 ? B : null;

    const verdictMessages = {
      'credit+rehab': {
        credit:  '아직 절박한 법적 상황이 아니고 분할상환으로 해결 가능한 범위라면, 법원 절차보다 부담이 적은 신용회복위원회를 먼저 시도하는 것이 합리적입니다. 채권자 동의가 안 되면 그때 개인회생을 고려하세요.',
        rehab:   '원금 감면 필요성 또는 법적 조치 대응 필요성이 절차 편의성보다 더 중요한 상황입니다. 신용회복위원회를 먼저 시도할 수도 있지만, 개인회생의 실질적 이점이 더 큰 상황으로 판단됩니다.',
        tie:     '신용회복위원회를 먼저 시도해 채권자 동의 여부를 확인한 후, 조정이 여의치 않으면 개인회생으로 이어가는 순서를 고려해 보세요.',
      },
      'bankrupt+rehab': {
        rehab:   '변제 여력이 있는 상황이라면 파산보다 개인회생이 우선 검토되어야 합니다. 재산을 유지하면서 원금 일부를 감면받을 수 있어 재기에 더 유리합니다.',
        bankrupt:'변제 능력이 없거나 채무가 변제 여력을 크게 초과하는 상황입니다. 무리하게 개인회생을 시도하기보다 파산·면책으로 채무를 해소하는 것이 현실적입니다.',
        tie:     '소득과 변제 여력이 경계선상에 있습니다. 가처분소득이 안정적으로 유지될 수 있다면 개인회생을, 그렇지 않다면 파산·면책을 검토하세요.',
      },
      'bankrupt+credit': {
        credit:  '소득이 있고 분할상환이 가능한 상황이라면 파산보다 신용회복위원회로 먼저 시도하는 것이 부담이 적습니다.',
        bankrupt:'소득이 없거나 신용회복위원회 조정이 어려운 조건이라면 파산·면책이 더 현실적인 선택입니다.',
        tie:     '소득이 있다면 신용회복위원회를 먼저, 여의치 않다면 파산·면책을 검토하는 순서로 접근해 보세요.',
      },
    };

    const msgs = verdictMessages[pair] || {};
    const verdictText = winner ? (msgs[winner.type] || '') : (msgs.tie || '');
    const verdictBgCls = winner
      ? (winner.type === 'rehab'    ? 'bg-blue-50 border-blue-200'
       : winner.type === 'bankrupt' ? 'bg-slate-50 border-slate-200'
       :                              'bg-teal-50 border-teal-200')
      : 'bg-slate-50 border-slate-200';
    const verdictTitleCls = winner
      ? (winner.type === 'rehab'    ? 'text-blue-800'
       : winner.type === 'bankrupt' ? 'text-slate-700'
       :                              'text-teal-800')
      : 'text-slate-700';
    const verdictLabel = winner ? `${winner.title} 우선 검토 권장` : '두 절차 모두 유효한 선택';

    const renderFactor = (f, iconCls) => `
      <li class="flex gap-2.5 leading-snug">
        <span class="${iconCls} shrink-0 font-bold mt-0.5">✓</span>
        <div>
          <p class="text-sm font-semibold text-slate-800">${f.text}</p>
          <p class="text-xs text-slate-500 mt-0.5 leading-relaxed">${f.reason}</p>
        </div>
      </li>`;

    return `
      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h3 class="font-bold text-slate-800 text-base mb-0.5">🤔 두 절차 중 어느 쪽이 더 유리할까요?</h3>
        <p class="text-sm text-slate-400 mb-1">귀하의 구체적 상황에서 각 절차가 갖는 실질적 장점을 요인별로 분석했습니다.</p>
        <p class="text-xs text-slate-300 mb-4">이 분석은 정성적 요인 비교이며, 위 <strong class="text-slate-400">적합도(%) 점수</strong>와 함께 참고하세요. 두 결과가 다를 수 있습니다.</p>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          <div class="border ${A.border} ${A.bg} rounded-xl p-4">
            <div class="flex items-center gap-1.5 mb-3">
              <span class="text-lg">${A.icon}</span>
              <h4 class="font-bold ${A.titleCls} text-sm">${A.title}${A.subj} 유리한 이유</h4>
            </div>
            ${aFactors.length > 0
              ? `<ul class="space-y-3">${aFactors.map(f => renderFactor(f, A.iconCls)).join('')}</ul>`
              : `<p class="text-xs text-slate-400">귀하의 상황에서 ${A.title}${A.subj} 특별히 유리한 요인이 확인되지 않습니다.</p>`}
          </div>
          <div class="border ${B.border} ${B.bg} rounded-xl p-4">
            <div class="flex items-center gap-1.5 mb-3">
              <span class="text-lg">${B.icon}</span>
              <h4 class="font-bold ${B.titleCls} text-sm">${B.title}${B.subj} 유리한 이유</h4>
            </div>
            ${bFactors.length > 0
              ? `<ul class="space-y-3">${bFactors.map(f => renderFactor(f, B.iconCls)).join('')}</ul>`
              : `<p class="text-xs text-slate-400">귀하의 상황에서 ${B.title}${B.subj} 특별히 유리한 요인이 확인되지 않습니다.</p>`}
          </div>
        </div>
        <div class="flex items-start gap-3 ${verdictBgCls} rounded-xl p-4">
          <span class="text-xl shrink-0 mt-0.5">💡</span>
          <div>
            <p class="font-bold ${verdictTitleCls} text-sm mb-1">종합 판단 — ${verdictLabel}</p>
            <p class="text-xs text-slate-600">${verdictText}</p>
          </div>
        </div>
        <p class="text-xs text-slate-400 mt-3 pt-3 border-t border-slate-100">위 분석은 입력값 기반 참고용이며, 최종 선택은 구체적 채무 현황과 전문가 상담을 통해 결정하시기 바랍니다.</p>
      </div>`;
  }

  // ── 메인 렌더링 ──
  function renderResults() {
    const rawScores = Storage.load('diagnosis_scores') || { rehab:0, bankrupt:0, credit:0 };
    const data      = Storage.load('diagnosis_data')   || {};
    const repay     = Storage.load('diagnosis_repay')  || {};
    const date      = Storage.load('diagnosis_date')   || '';

    // 법적 재신청 불가 케이스에 0% 강제 적용
    const scores = applyHardBlocks(rawScores, data);

    // 하드블록 여부 (점수 0 + 사유 존재)
    const hardBlocked = {
      rehab:    scores.rehab    === 0 && !!getHardBlockReason('rehab',    data),
      bankrupt: scores.bankrupt === 0 && !!getHardBlockReason('bankrupt', data),
      credit:   scores.credit   === 0 && !!getHardBlockReason('credit',   data),
    };

    document.getElementById('result-date').textContent = date ? '진단일: ' + date : '';

    // 최적 절차 배너
    document.getElementById('best-recommendation').innerHTML = buildBanner(scores, data, hardBlocked);

    // 적합도 카드 3개
    document.getElementById('result-cards').innerHTML =
      buildCard('개인회생',                 'rehab',    scores.rehab,    data, hardBlocked) +
      buildCard('개인파산·면책',             'bankrupt', scores.bankrupt, data, hardBlocked) +
      buildCard('신용회복위원회 채무조정제도', 'credit',   scores.credit,   data, hardBlocked);

    // 점수 1위 절차 (아코디언 자동 펼침용)
    const winnerType = Object.entries({ rehab: scores.rehab, bankrupt: scores.bankrupt, credit: scores.credit })
      .sort((a, b) => b[1] - a[1])[0][0];

    // ── 개인회생 상세: 적합도 30% 이상일 때만 표시 ──
    const rehabEl = document.getElementById('rehab-detail');
    if (scores.rehab >= 30) {
      const monthlyDisp = repay.monthly || 0;
      const total36     = repay.total36 || 0;
      const exempt      = repay.exempt  || 0;
      rehabEl.style.display = '';
      rehabEl.innerHTML = `
        <h3 class="font-bold text-slate-800 text-lg mb-1">📋 <span class="text-blue-700">개인회생 진행 시</span> 예상 변제금 계산(참고)</h3>
        <p class="text-slate-500 text-sm mb-4">법원 실무에서 사용하는 표준생계비 기준을 적용한 참고값입니다. (변제기간 3년·36개월 기준)</p>

        ${monthlyDisp === 0 ? `
        <!-- 월 변제 0원 경고 -->
        <div class="flex items-start gap-3 bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4">
          <span class="text-xl shrink-0 mt-0.5">⚠️</span>
          <div>
            <p class="font-bold text-amber-800 text-sm mb-1">변제 여력이 없는 상태입니다</p>
            <p class="text-xs text-slate-600">소득이 표준생계비에 미달하여 월 변제액이 0원으로 계산됩니다. 이 경우 법원은 개인회생 변제계획을 인가하지 않고 <strong>개인파산·면책 절차를 권고</strong>할 수 있습니다. 아래 수치는 현재 소득 기준의 참고용이며, 향후 소득이 증가하면 재검토하세요.</p>
          </div>
        </div>` : ''}

        <!-- 계산 근거 -->
        <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-4">
          <p class="text-xs font-semibold text-blue-700 mb-2.5">📐 계산 방식 및 적용 기준</p>
          <div class="space-y-1.5 text-xs text-slate-600">
            <div class="flex items-start gap-2">
              <span class="text-blue-400 mt-0.5 shrink-0">①</span>
              <span><strong class="text-slate-700">표준생계비</strong> = 2026년 기준중위소득(보건복지부 고시) × 60% — 법원이 변제계획 심사 시 인정하는 최소 생활비 기준</span>
            </div>
            <div class="flex items-start gap-2">
              <span class="text-blue-400 mt-0.5 shrink-0">②</span>
              <span><strong class="text-slate-700">적용 생계비</strong> = 표준생계비와 입력 생활비 중 <em>더 큰 값</em> 적용 — 실제 생활비가 더 높은 경우 입력값 우선</span>
            </div>
            <div class="flex items-start gap-2">
              <span class="text-blue-400 mt-0.5 shrink-0">③</span>
              <span><strong class="text-slate-700">월 변제 가능액</strong> = 월 소득 − 적용 생계비 — 법원에 제출하는 변제계획안의 기본 산식과 동일</span>
            </div>
            <div class="flex items-start gap-2">
              <span class="text-blue-400 mt-0.5 shrink-0">④</span>
              <span><strong class="text-slate-700">총 변제금</strong> = 월 변제액 × 36개월 (법정 최단 변제기간 3년 기준)</span>
            </div>
          </div>
          <div class="mt-3 pt-2.5 border-t border-blue-200 flex flex-wrap gap-x-4 gap-y-1 text-xs text-slate-500">
            <span>가구원 수: <strong class="text-slate-700">${repay.householdSize || 1}인</strong></span>
            <span>표준생계비(기준중위소득 60%): <strong class="text-slate-700">${formatWon(repay.standardLiving || 0)}</strong></span>
            <span>실제 적용 생계비: <strong class="text-slate-700">${formatWon(repay.effectiveLiving || 0)}</strong>
              ${(repay.effectiveLiving || 0) > (repay.standardLiving || 0)
                ? '<span class="text-amber-600">(입력 생활비 적용)</span>'
                : '<span class="text-blue-600">(표준생계비 적용)</span>'}
            </span>
          </div>
        </div>

        <!-- 결과 카드 -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
          <div class="bg-blue-50 rounded-xl p-4 text-center">
            <div class="text-xs text-slate-500 mb-1">월 변제 가능 추정액</div>
            <div class="text-xl font-bold text-blue-700">${formatWon(monthlyDisp)}</div>
            <div class="text-xs text-slate-400 mt-1">소득 − 적용 생계비</div>
          </div>
          <div class="bg-blue-50 rounded-xl p-4 text-center">
            <div class="text-xs text-slate-500 mb-1">예상 총 변제금 (36개월)</div>
            <div class="text-xl font-bold text-blue-700">${formatWon(total36)}</div>
            <div class="text-xs text-slate-400 mt-1">월 변제액 × 36</div>
          </div>
          <div class="bg-green-50 rounded-xl p-4 text-center">
            <div class="text-xs text-slate-500 mb-1">예상 면책 가능 채무액</div>
            <div class="text-xl font-bold text-green-700">${formatWon(Math.max(0, exempt))}</div>
            <div class="text-xs text-slate-400 mt-1">총 채무 − 총 변제금</div>
          </div>
        </div>

        <!-- 법적 근거 및 주의사항 -->
        <div class="disclaimer-box">
          <p class="font-medium text-slate-700 mb-1">⚖️ 법적 근거</p>
          <ul class="space-y-0.5 text-xs text-slate-500 mb-2">
            <li>· 채무자 회생 및 파산에 관한 법률 제579조 (변제계획 인가 요건)</li>
            <li>· 보건복지부 고시 — 2026년 기준중위소득 (가구원 수별 표준생계비 산정 기준)</li>
            <li>· 법원 실무 — 변제계획안 작성 시 기준중위소득 60%를 표준생계비로 적용</li>
          </ul>
          <p class="text-xs text-slate-500">위 금액은 법원 실무 기준에 준하는 산식으로 산출한 참고값입니다. 실제 변제금은 <span class="term-tip" data-tip="지금 당장 파산했을 때 재산을 팔아 채권자에게 돌아갈 금액입니다.">청산가치</span> 보장 원칙, 소득·재산 심사 결과, 담보채무 규모, 채권자 의견 등에 따라 달라질 수 있습니다.</p>
        </div>
        <a href="rehabilitation.html" class="mt-4 inline-block bg-blue-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-800 transition-colors">개인회생 셀프진행 →</a>
      `;
      makeAccordion(rehabEl, winnerType === 'rehab');
    } else {
      rehabEl.style.display = 'none';
    }

    // ── 개인파산 상세: 적합도 30% 이상일 때만 표시 ──
    const bankruptEl = document.getElementById('bankrupt-detail');
    if (scores.bankrupt >= 30) {
      const income = data.monthlyIncome || 0;
      const assets = data.totalAssets   || 0;
      const debt   = data.totalDebt     || 0;
      const causes = data.debtCauses    || [];
      bankruptEl.style.display = '';
      bankruptEl.innerHTML = `
        <h3 class="font-bold text-slate-800 text-lg mb-1">⚖️ 개인파산·면책 · 주요 검토 사항</h3>
        <p class="text-slate-500 text-sm mb-4">파산 신청 전 아래 항목을 반드시 확인하세요.</p>
        <div class="space-y-3">
          <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg">
            <span class="text-lg mt-0.5">${income < 500000 ? '🔴' : '🟡'}</span>
            <div>
              <div class="font-semibold text-sm text-slate-800">변제능력 부족 여부</div>
              <p class="text-xs text-slate-500 mt-0.5">
                ${income < 500000
                  ? '소득이 매우 낮아 변제 불능 상태에 해당할 가능성이 높습니다.'
                  : hardBlocked.rehab
                    ? '소득이 일부 있으나 개인회생 신청이 불가한 상황으로, 파산·면책이 현실적인 선택입니다.'
                    : '소득이 일부 있으므로, 파산 전 개인회생 가능 여부를 먼저 검토하는 것이 유리합니다.'}
              </p>
            </div>
          </div>
          <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg">
            <span class="text-lg mt-0.5">${assets < debt * 0.3 ? '🔴' : '🟡'}</span>
            <div>
              <div class="font-semibold text-sm text-slate-800">재산 처분 가능성</div>
              <p class="text-xs text-slate-500 mt-0.5">
                파산 시 보유 재산(일정 한도 초과분)은 파산재단에 편입될 수 있습니다.
                ${assets > 0 ? '보유 재산 약 ' + formatWon(assets) + ' — 전문가 확인 권장.' : '재산이 거의 없어 처분 대상이 없을 수 있습니다.'}
              </p>
            </div>
          </div>
          <div class="flex items-start gap-3 p-3 ${causes.includes('gambling') ? 'bg-red-50 border border-red-100' : 'bg-amber-50 border border-amber-100'} rounded-lg">
            <span class="text-lg mt-0.5">${causes.includes('gambling') ? '🔴' : '⚠️'}</span>
            <div>
              <div class="font-semibold text-sm text-slate-800">면책불허가 사유 확인 필요</div>
              <p class="text-xs text-slate-500 mt-0.5">
                ${causes.includes('gambling')
                  ? '도박·사행성 채무가 포함되어 있어 면책불허가 사유(법 제564조) 해당 가능성이 있습니다. 신청 자체는 가능하지만, 법률전문가와 상담해보시는 것을 권장합니다.'
                  : '도박·낭비·허위 재산신고·최근 신규 대출 등은 면책불허가 사유가 될 수 있습니다. 채무 발생 경위를 정확히 정리해야 합니다.'}
              </p>
            </div>
          </div>
        </div>
        <div class="disclaimer-box mt-4">면책 여부는 법원이 최종 결정합니다. 본 안내는 참고용이며 결과를 보장하지 않습니다.</div>
        <a href="bankruptcy.html" class="mt-4 inline-block bg-slate-700 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-slate-800 transition-colors">개인파산 진행센터 →</a>
      `;
      makeAccordion(bankruptEl, winnerType === 'bankrupt');
    } else {
      bankruptEl.style.display = 'none';
    }

    // ── 신용회복위원회 채무조정제도 상세: 신청불가(0%)이면 숨김 ──
    const creditEl = document.getElementById('credit-detail');
    if (scores.credit === 0) {
      creditEl.style.display = 'none';
    } else {
      const arrears  = data.arrearsMonths || 0;
      const programs = getCCRSPrograms(data);

      const programRows = programs.length > 0
        ? programs.map(p => `
            <div class="flex items-start gap-3 p-3 bg-teal-50 border border-teal-100 rounded-lg">
              <span class="text-lg mt-0.5">✅</span>
              <div>
                <div class="font-semibold text-sm text-teal-800">${p.name} <span class="font-normal text-xs text-teal-600">(${p.tag})</span></div>
                <p class="text-xs text-slate-500 mt-0.5">${p.desc}</p>
              </div>
            </div>`).join('')
        : `<div class="p-3 bg-slate-50 rounded-lg text-xs text-slate-500">입력하신 조건에서 신용회복위원회 채무조정 대상 여부를 특정하기 어렵습니다. 공식 사이트에서 직접 확인하세요.</div>`;

      creditEl.innerHTML = `
        <h3 class="font-bold text-slate-800 text-lg mb-1">🏛️ 신용회복위원회 채무조정제도 안내</h3>
        <p class="text-slate-500 text-sm mb-4">법원 절차 없이 이용 가능한 민간 채무조정 절차입니다. 아래에서 귀하에게 해당되는 세부 제도를 확인하세요.</p>

        <div class="space-y-2 mb-4">${programRows}</div>

        <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg mb-4">
          <span class="text-lg mt-0.5">ℹ️</span>
          <div>
            <div class="font-semibold text-sm text-slate-800">신용회복위원회 절차의 특징</div>
            <p class="text-xs text-slate-500 mt-0.5">법원 절차보다 간소하지만 <strong>채권자 동의가 필요</strong>하며, 모든 채권자가 참여하지 않을 수 있습니다. 대부업·사채·세금 채무는 조정 대상에서 제외됩니다.</p>
          </div>
        </div>

        <div class="disclaimer-box">
          신용회복위원회 절차는 법원 절차와 다릅니다. 공식 안내(ccrs.or.kr)를 반드시 확인하세요.
        </div>
        <a href="https://www.ccrs.or.kr" target="_blank" rel="noopener"
           class="mt-4 inline-block bg-teal-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-teal-700 transition-colors">
          신용회복위원회 공식 사이트 →
        </a>

        <div class="mt-5 bg-blue-50 border border-blue-200 rounded-xl p-4">
          <p class="font-bold text-blue-800 text-sm mb-1">💡 채권자 동의가 거부될 경우</p>
          <p class="text-xs text-slate-600 mb-3">일부 채권자가 거부하거나 대부업·세금 채무가 포함된 경우, <strong>법원이 강제로 결정하는 개인회생 절차</strong>가 대안이 됩니다.</p>
          <a href="rehabilitation.html" class="inline-flex items-center gap-2 bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-semibold hover:bg-blue-800 transition-colors">
            📋 개인회생 절차 알아보기 →
          </a>
        </div>
      `;
      makeAccordion(creditEl, winnerType === 'credit');
    }

    // ── 상세 섹션: 점수 높은 순으로 재정렬 ──
    const container = document.getElementById('detail-sections-container');
    const scoreMap  = { rehab: scores.rehab, bankrupt: scores.bankrupt, credit: scores.credit };
    const sections  = Array.from(container.children);
    sections
      .sort((a, b) => (scoreMap[b.dataset.type] || 0) - (scoreMap[a.dataset.type] || 0))
      .forEach(el => container.appendChild(el));
  }

  renderResults();
</script>
</body>
</html>

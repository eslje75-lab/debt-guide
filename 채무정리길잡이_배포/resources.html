<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자료실 · FAQ | 채무정리길잡이</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50">
<div id="header-placeholder"></div>

<section class="bg-blue-700 text-white py-8">
  <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-2xl md:text-3xl font-bold mb-1">자료실 · FAQ</h1>
    <p class="text-blue-100 text-sm">개인회생·파산 절차에 대한 안내와 자주 묻는 질문을 확인하세요.</p>
  </div>
</section>

<div class="max-w-5xl mx-auto px-4 py-8">

  <!-- 카테고리 탭 -->
  <div class="flex gap-2 mb-6 overflow-x-auto pb-1 flex-wrap">
    <button onclick="setTab('faq')" id="tab-faq" class="rtab bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap">자주 묻는 질문</button>
    <button onclick="setTab('rehab')" id="tab-rehab" class="rtab bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">개인회생 가이드</button>
    <button onclick="setTab('bankrupt')" id="tab-bankrupt" class="rtab bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">개인파산 가이드</button>
    <button onclick="setTab('credit')" id="tab-credit" class="rtab bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">신용회복위원회</button>
    <button onclick="setTab('checklist')" id="tab-checklist" class="rtab bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap">제출 전 체크리스트</button>
  </div>

  <!-- 콘텐츠 영역 -->
  <div id="resource-content"></div>

  <div class="disclaimer-box mt-6">
    본 자료실의 모든 내용은 일반적인 참고 안내입니다. 법률상담·법률대리가 아니며, 실제 절차는 법원 공고 및 전문가 안내를 우선으로 따르세요.
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="toast"></div>

<script src="js/main.js"></script>
<script>
  initPage('resources');

  const TABS = {
    faq: renderFAQ,
    rehab: renderRehabGuide,
    bankrupt: renderBankruptGuide,
    credit: renderCreditGuide,
    checklist: renderChecklist,
  };

  function setTab(tab) {
    document.querySelectorAll('.rtab').forEach(b => {
      b.className = b.id === 'tab-' + tab
        ? 'rtab bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap'
        : 'rtab bg-white text-slate-600 border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50 whitespace-nowrap';
    });
    TABS[tab]();
  }

  // ── FAQ ──
  const FAQS = [
    { q: '개인회생과 개인파산의 차이가 무엇인가요?', a: '개인회생은 정기적인 소득이 있는 채무자가 3~5년간 일부 채무를 변제하고 나머지를 면책받는 절차입니다. 개인파산은 소득과 재산이 없어 변제 자체가 불가능한 채무자가 재산을 정리하고 채무 전부를 면책받는 절차입니다. 소득 유무와 변제 가능성이 핵심 구분 기준입니다.' },
    { q: '개인회생 신청 시 변호사나 법무사가 꼭 필요한가요?', a: '법원은 채무자 본인이 직접 신청할 수 있도록 하고 있습니다. 다만 절차가 복잡하므로 스스로 준비하기 어려울 경우 법무사나 변호사 도움을 받을 수 있습니다. 대한법률구조공단에서는 법률구조 요건을 충족하면 무료 지원도 받을 수 있습니다.' },
    { q: '개인회생 신청 중에 직장이나 은행 거래가 영향을 받나요?', a: '개인회생 신청 사실이 고용주에게 직접 통보되지는 않습니다. 다만 금융거래(대출·신규 카드 발급 등)는 신용정보 등록으로 인해 제한될 수 있습니다. 재직 중 압류·추심이 있었다면 이미 고용주가 알 수 있는 상황일 수 있습니다.' },
    { q: '개인파산을 하면 직장을 잃게 되나요?', a: '파산선고 자체가 자동으로 해고 사유가 되지는 않습니다. 다만 법령에 따라 일부 직종(공무원, 금융업 임직원 등)은 결격 사유가 될 수 있으므로 해당 직종 종사자는 반드시 전문가 상담을 받으세요.' },
    { q: '면책불허가가 되면 어떻게 되나요?', a: '면책불허가 결정이 나면 채무는 소멸되지 않습니다. 다만 법원에 즉시항고가 가능하며, 면책불허가 이후에도 개인회생 신청 등 다른 방법을 검토할 수 있습니다. 면책불허가 사유에 해당하는지 사전에 반드시 확인하세요.' },
    { q: '신용회복위원회 절차는 법원 절차와 다른가요?', a: '네, 신용회복위원회는 법원이 아닌 민간 기관(은행연합회 산하)입니다. 채권자 동의를 기반으로 이자 감면·분할 상환을 조정하는 절차이며, 법원 절차보다 간소합니다. 다만 채권자 전원 동의가 필요해 일부 채권자가 거부하면 조정이 어려울 수 있습니다.' },
    { q: '개인회생 신청 후 변제기간 동안 어떤 제한이 있나요?', a: '변제기간 중에는 법원의 허가 없이 고액 재산 처분, 신규 차입 등이 제한됩니다. 매월 변제금을 변제관리인에게 납입해야 하며, 소득이 크게 증가한 경우 변제금이 증가할 수 있습니다. 변제 기간 동안 성실히 이행해야 면책이 가능합니다.' },
    { q: '채무 발생 원인이 도박인 경우 파산 면책이 안 되나요?', a: '도박·낭비·사치로 채무가 발생한 경우 면책불허가 사유에 해당합니다. 다만 법원은 재량으로 면책을 허가할 수 있으며, 도박 이후 장기간 성실하게 변제 노력을 한 경우 등이 참작될 수 있습니다. 이 경우 반드시 전문가 상담을 먼저 받으세요.' },
    { q: '개인회생 변제금은 어떻게 계산되나요?', a: '법원은 채무자의 월 가처분소득(소득 - 법원 인정 생계비)을 기준으로 변제금을 산정합니다. 여기에 보유 재산의 청산가치도 고려됩니다. 저희 사이트의 예상 변제금은 단순 참고용이며, 실제 금액은 법원이 소득·재산·부양가족 등을 종합하여 결정합니다.' },
    { q: '개인파산 후 재산은 어떻게 되나요?', a: '파산선고 시 일정 한도 이상의 재산은 파산재단에 편입되어 채권자에게 배당됩니다. 다만 생계에 필수적인 의류·가구, 월 150만원 이하의 급여(법원 판단), 퇴직금의 일부 등은 보호됩니다. 소액 파산의 경우 처분할 재산이 없으면 배당 절차 없이 진행됩니다.' },
  ];

  function renderFAQ() {
    const html = FAQS.map((item, i) => `
      <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden mb-3">
        <button onclick="toggleFaq(${i})" class="w-full flex items-center justify-between p-5 text-left hover:bg-slate-50 transition-colors">
          <span class="font-semibold text-slate-800 text-sm pr-4">Q. ${item.q}</span>
          <span id="faq-icon-${i}" class="faq-icon text-slate-400 text-xl shrink-0">+</span>
        </button>
        <div id="faq-ans-${i}" class="faq-answer px-5 pb-5">
          <div class="bg-blue-50 rounded-xl p-4 text-sm text-slate-700 leading-relaxed border-l-4 border-blue-200">
            A. ${item.a}
          </div>
        </div>
      </div>`).join('');
    document.getElementById('resource-content').innerHTML = html;
  }

  function toggleFaq(i) {
    const ans = document.getElementById('faq-ans-' + i);
    const icon = document.getElementById('faq-icon-' + i);
    ans.classList.toggle('open');
    icon.classList.toggle('open');
    icon.textContent = ans.classList.contains('open') ? '−' : '+';
  }

  // ── 개인회생 가이드 ──
  function renderRehabGuide() {
    document.getElementById('resource-content').innerHTML = `
      <div class="space-y-4">
        ${guideCard('개인회생이란?', '정기적인 소득이 있는 채무자가 법원의 감독 하에 3~5년간 일부 채무를 변제하고 나머지를 면책받는 절차입니다.',
          ['담보채무 15억 원, 비담보채무 10억 원 이하 채무자','정기적인 소득이 있어야 함 (근로·사업·연금 등)','변제기간: 보통 3년, 최대 5년','변제 완료 후 나머지 채무 전액 면책'])}
        ${guideCard('신청 절차', '개인회생 신청부터 면책까지의 주요 단계를 안내합니다.',
          ['① 신청서·첨부서류 준비 → 관할 법원 제출','② 개시결정 → 변제계획 인가 절차','③ 채권자집회 또는 서면 의결','④ 변제계획 인가결정','⑤ 매월 변제관리인에게 변제금 납입 (3~5년)','⑥ 변제 완료 → 면책결정'])}
        ${guideCard('주요 비용', '개인회생 절차에 필요한 비용을 안내합니다.',
          ['인지대: 10,000원~20,000원 수준','송달료: 20만원~40만원 수준 (채권자 수에 따라 상이)','변제관리인 비용: 변제금의 일부 (법원 고시 기준)','※ 본인 직접 신청 시 법무사·변호사 수임료 불필요'])}
        <div class="bg-blue-50 rounded-xl p-4 text-sm text-blue-800">
          <strong>더 자세한 정보:</strong>
          <a href="rehabilitation.html" class="text-blue-600 hover:underline ml-1">개인회생 셀프 진행센터 →</a>
        </div>
      </div>`;
  }

  // ── 개인파산 가이드 ──
  function renderBankruptGuide() {
    document.getElementById('resource-content').innerHTML = `
      <div class="space-y-4">
        ${guideCard('개인파산·면책이란?', '소득과 재산으로 채무를 변제할 수 없는 채무자가 재산을 정리하고 채무 전부를 면책받는 법원 절차입니다.',
          ['소득이 없거나 변제 능력이 없는 채무자','재산 전부를 파산재단에 편입 후 채권자 배당','면책 후 채무 전액 소멸 (면책불허가 사유 없는 경우)','면책불허가 사유: 도박·낭비·허위신고 등'])}
        ${guideCard('신청 절차', '개인파산·면책 신청부터 면책 확정까지의 주요 단계입니다.',
          ['① 파산·면책 신청서 준비 → 관할 법원 제출 (동시 신청)','② 파산관재인 선임 (소액파산은 생략 가능)','③ 채무자 심문기일 출석','④ 파산선고 결정','⑤ 재산 환가·배당 (재산이 없으면 생략)','⑥ 면책 심리 → 면책결정 또는 불허가','⑦ 이의신청 기간 경과 후 면책 확정'])}
        ${guideCard('면책 후 제한사항', '면책 이후에도 주의해야 할 사항이 있습니다.',
          ['신용불량 정보 등록 (일정 기간)','일부 직종 결격 사유 (공무원·금융업 임직원 등)','비면책 채무는 소멸 안 됨: 세금·벌금·양육비·고의 불법행위 채무 등','면책 이후 7년 내 재파산 신청 제한'])}
        <div class="bg-slate-50 rounded-xl p-4 text-sm text-slate-700">
          <strong>더 자세한 정보:</strong>
          <a href="bankruptcy.html" class="text-blue-600 hover:underline ml-1">개인파산 셀프 진행센터 →</a>
        </div>
      </div>`;
  }

  // ── 신용회복위원회 ──
  function renderCreditGuide() {
    document.getElementById('resource-content').innerHTML = `
      <div class="space-y-4">
        ${guideCard('신용회복위원회란?', '은행연합회 산하 기관으로, 연체 채무자와 금융기관 간 채무조정을 중재하는 비법원 기관입니다.',
          ['연체기간이 짧거나 법원 절차 전 단계에 적합','이자 감면·원금 일부 감면·분할 상환 조정','법원 절차보다 간소하나 채권자 동의 필요','신청: 신용회복위원회 공식 홈페이지 또는 지점 방문'])}
        ${guideCard('주요 프로그램', '신용회복위원회의 주요 채무조정 프로그램을 안내합니다.',
          ['사전채무조정: 연체 전 또는 30일 미만 연체 시','채무조정(워크아웃): 3개월 이상 연체 시','개인워크아웃: 총 채무 15억 이하, 연체 3개월 이상'])}
        ${guideCard('신청 방법', '신용회복위원회 채무조정 신청 방법을 안내합니다.',
          ['공식 사이트(ccrs.or.kr) 온라인 신청','전국 지점 방문 신청','콜센터(1600-5500) 문의 후 상담 예약','무료 이용 가능 (별도 비용 없음)'])}
        <div class="flex gap-3">
          <a href="https://www.ccrs.or.kr" target="_blank" rel="noopener"
            class="flex-1 text-center bg-teal-600 text-white px-4 py-3 rounded-xl text-sm font-medium hover:bg-teal-700 transition-colors">
            신용회복위원회 공식 사이트 →
          </a>
        </div>
      </div>`;
  }

  // ── 제출 전 체크리스트 ──
  function renderChecklist() {
    const rehabList = ['개인회생 신청서 (법원 양식, 서명·날인)','변제계획안','채권자 목록 (부본 포함)','재산목록','수입·지출 명세서','주민등록등본 (3개월 이내)','가족관계증명서','소득증명서류 (급여명세서·원천징수영수증)','채무잔액증명서 (채권자별)','예금잔액증명서','인지대·송달료 납부 영수증'];
    const bankruptList = ['파산 신청서 (법원 양식, 서명·날인)','면책 신청서','채무자 심문사항 진술서','채권자 목록','재산목록','수입·지출 명세서','주민등록등본','가족관계증명서','인감증명서','소득증명 (없으면 무소득 확인서)','채무잔액증명서','재산 증빙서류 일체','인지대 납부 영수증'];

    document.getElementById('resource-content').innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
          <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><span class="text-green-600">📋</span> 개인회생 제출 전 체크리스트</h3>
          ${rehabList.map((item, i) => `
            <div class="flex items-start gap-2 py-2 border-b border-slate-50 last:border-0">
              <span class="text-slate-300 font-bold text-sm shrink-0">${i+1}.</span>
              <span class="text-sm text-slate-700">${item}</span>
            </div>`).join('')}
          <a href="rehabilitation.html" class="mt-4 block text-center text-sm text-blue-600 hover:underline">개인회생 진행센터에서 체크하기</a>
        </div>
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
          <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2"><span class="text-slate-600">⚖️</span> 개인파산 제출 전 체크리스트</h3>
          ${bankruptList.map((item, i) => `
            <div class="flex items-start gap-2 py-2 border-b border-slate-50 last:border-0">
              <span class="text-slate-300 font-bold text-sm shrink-0">${i+1}.</span>
              <span class="text-sm text-slate-700">${item}</span>
            </div>`).join('')}
          <a href="bankruptcy.html" class="mt-4 block text-center text-sm text-blue-600 hover:underline">개인파산 진행센터에서 체크하기</a>
        </div>
      </div>
      <div class="bg-amber-50 border border-amber-100 rounded-xl p-4 mt-4 text-xs text-amber-700">
        ※ 법원에 따라 추가 서류를 요청할 수 있습니다. 접수 전 관할 법원에 최종 확인하는 것을 권장합니다.
      </div>`;
  }

  function guideCard(title, desc, items) {
    return `
      <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5">
        <h3 class="font-bold text-slate-800 mb-1">${title}</h3>
        <p class="text-slate-500 text-sm mb-3">${desc}</p>
        <ul class="space-y-1.5">
          ${items.map(i => `<li class="flex gap-2 text-sm text-slate-700"><span class="text-blue-500 shrink-0">•</span>${i}</li>`).join('')}
        </ul>
      </div>`;
  }

  // 기본: FAQ
  renderFAQ();
</script>

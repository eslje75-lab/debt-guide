<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ | 챔로드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50">
<div id="header-placeholder"></div>

<section class="bg-blue-700 text-white py-8">
  <div class="max-w-5xl mx-auto px-4">
    <h1 class="text-2xl md:text-3xl font-bold mb-1">FAQ</h1>
    <p class="text-blue-100 text-sm">개인회생·파산 절차에 대해 자주 묻는 질문을 확인하세요.</p>
  </div>
</section>

<div class="max-w-5xl mx-auto px-4 py-8">

  <!-- FAQ 콘텐츠 -->
  <div id="resource-content"></div>

</div>

<div id="footer-placeholder"></div>
<div id="toast"></div>

<script src="js/main.js"></script>
<script>
  initPage('resources');

  const FAQS = [
    { q: '개인회생과 개인파산의 차이가 무엇인가요?', a: '개인회생은 정기적인 소득이 있는 채무자가 3~5년간 일부 채무를 변제하고 나머지를 면책받는 절차입니다. 개인파산은 소득과 재산이 없어 변제 자체가 불가능한 채무자가 재산을 정리하고 채무 전부를 면책받는 절차입니다. 소득 유무와 변제 가능성이 핵심 구분 기준입니다.' },
    { q: '개인회생 신청 시 변호사나 법무사가 꼭 필요한가요?', a: '법원은 채무자 본인이 직접 신청할 수 있도록 하고 있습니다. 다만 절차가 복잡하므로 스스로 준비하기 어려울 경우 법무사나 변호사 도움을 받을 수 있습니다. 대한법률구조공단에서는 법률구조 요건을 충족하면 무료 지원도 받을 수 있습니다.' },
    { q: '개인회생 신청 중에 직장이나 은행 거래가 영향을 받나요?', a: '개인회생 신청 사실이 고용주에게 직접 통보되지는 않습니다. 다만 금융거래(대출·신규 카드 발급 등)는 신용정보 등록으로 인해 제한될 수 있습니다. 재직 중 압류·추심이 있었다면 이미 고용주가 알 수 있는 상황일 수 있습니다.' },
    { q: '개인파산을 하면 직장을 잃게 되나요?', a: '파산선고 자체가 자동으로 해고 사유가 되지는 않습니다. 다만 법령에 따라 일부 직종(공무원, 금융업 임직원 등)은 결격 사유가 될 수 있으므로 해당 직종 종사자는 반드시 전문가 상담을 받으세요.' },
    { q: '면책불허가가 되면 어떻게 되나요?', a: '면책불허가 결정이 나면 채무는 소멸되지 않습니다. 다만 법원에 즉시항고가 가능하며, 면책불허가 이후에도 개인회생 신청 등 다른 방법을 검토할 수 있습니다. 면책불허가 사유에 해당하는지 사전에 반드시 확인하세요.' },
    { q: '신용회복위원회 절차는 법원 절차와 다른가요?', a: '네, 신용회복위원회는 법원이 아닌 민간 채무조정 기관으로, 금융회사들이 신용회복지원협약을 맺어 운영합니다. 협약에 가입한 금융회사(은행·카드사·캐피탈·저축은행 등)를 대상으로 이자 감면·분할 상환을 조정하는 절차이며, 법원 절차보다 간소합니다. 단, 협약에 가입하지 않은 금융회사나 사채·개인 간 채무는 조정 대상에서 제외될 수 있습니다.' },
    { q: '개인회생 신청 후 변제기간 동안 어떤 제한이 있나요?', a: '변제기간 중에는 법원의 허가 없이 고액 재산 처분, 신규 차입 등이 제한됩니다. 매월 변제금을 변제관리인에게 납입해야 하며, 소득이 크게 증가한 경우 변제금이 증가할 수 있습니다. 변제 기간 동안 성실히 이행해야 면책이 가능합니다.' },
    { q: '채무 발생 원인이 도박인 경우 파산 면책이 안 되나요?', a: '도박·낭비·사치로 채무가 발생한 경우 면책불허가 사유에 해당합니다. 다만 법원은 재량으로 면책을 허가할 수 있으며, 도박 이후 장기간 성실하게 변제 노력을 한 경우 등이 참작될 수 있습니다. 이 경우 반드시 전문가 상담을 먼저 받으세요.' },
    { q: '개인회생 변제금은 어떻게 계산되나요?', a: '법원은 채무자의 월 가처분소득(소득 - 법원 인정 생계비)을 기준으로 변제금을 산정합니다. 여기에 보유 재산의 청산가치도 고려됩니다. 저희 사이트의 예상 변제금은 단순 참고용이며, 실제 금액은 법원이 소득·재산·부양가족 등을 종합하여 결정합니다.' },
    { q: '개인파산 후 재산은 어떻게 되나요?', a: '파산선고 시 일정 한도 이상의 재산은 파산재단에 편입되어 채권자에게 배당됩니다. 다만 생계에 필수적인 의류·가구, 월 150만원 이하의 급여(법원 판단), 퇴직금의 일부 등은 보호됩니다. 소액 파산의 경우 처분할 재산이 없으면 배당 절차 없이 진행됩니다.' },
  ];

  function renderFAQ() {
    const html = FAQS.map((item, i) => `
      <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden mb-3">
        <button onclick="toggleFaq(${i})" class="w-full flex items-center justify-between p-5 text-left hover:bg-slate-50 transition-colors">
          <span class="font-semibold text-slate-800 text-sm pr-4">Q. ${item.q}</span>
          <span id="faq-icon-${i}" class="faq-icon text-slate-400 text-xl shrink-0">+</span>
        </button>
        <div id="faq-ans-${i}" class="faq-answer px-5 pb-5">
          <div class="bg-blue-50 rounded-xl p-4 text-sm text-slate-700 leading-relaxed border-l-4 border-blue-200 flex gap-2">
            <span class="font-semibold shrink-0">A.</span><span>${item.a}</span>
          </div>
        </div>
      </div>`).join('');
    document.getElementById('resource-content').innerHTML = html;
  }

  function toggleFaq(i) {
    const ans = document.getElementById('faq-ans-' + i);
    const icon = document.getElementById('faq-icon-' + i);
    ans.classList.toggle('open');
    icon.classList.toggle('open');
    icon.textContent = ans.classList.contains('open') ? '−' : '+';
  }

  renderFAQ();
</script>
</body>
</html>
